<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SnapPix</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    /* ===== ESTILOS GLOBALES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      font-family: 'CustomFont', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    *:focus {
      outline: none !important;
      box-shadow: none !important;
    }
    button:focus, input:focus, textarea:focus, select:focus {
      outline: none !important;
      box-shadow: none !important;
    }
    @font-face {
      font-family: 'CustomFont';
      src: url('https://raw.githubusercontent.com/SterlingPlus-Studio/clyraplay.xyz/main/Fuente/fuente.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      padding-top: 70px;
      padding-bottom: 80px;
      transition: padding-top 0.2s;
    }
    body.top-bar-hidden {
      padding-top: 0;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #000;
      padding: 16px 20px 12px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      height: 70px;
    }
    .top-bar.hidden { display: none; }
    .top-bar .app-title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: default;
    }
    .top-bar .app-title span {
      background: linear-gradient(145deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .top-bar .right-icons {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .top-bar .right-icons .icon-btn {
      color: #ccc;
      font-size: 20px; /* ligera reducción */
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
      transition: 0.2s;
      position: relative;
    }
    .top-bar .right-icons .icon-btn:hover { color: #fff; }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: auto;
      -webkit-overflow-scrolling: auto;
      height: 100%;
      position: relative;
      scroll-padding-top: 0px;
    }
    .feed-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
      background: #000;
    }

    /* ===== POST CARD ===== */
    .post-card {
      position: relative;
      width: 100%;
      height: calc(100dvh - 70px - 80px);
      min-height: unset;
      max-height: calc(100dvh - 70px - 80px);
      background-color: #000;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      border-radius: 0;
      border: none;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      flex-shrink: 0;
      scroll-margin: 0;
    }
    body.top-bar-hidden .post-card {
      height: calc(100dvh - 80px);
      max-height: calc(100dvh - 80px);
    }
    .post-image-carousel {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: auto;
      scroll-behavior: auto;
      background: #000;
      z-index: 1;
      cursor: pointer;
    }
    .post-image-carousel::-webkit-scrollbar { display: none; }
    .carousel-slide {
      flex: 0 0 100%;
      height: 100%;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background-color: #000;
      pointer-events: none;
    }
    .post-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }
    .post-bottom-left {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 80px;
      z-index: 3;
      color: #fff;
      pointer-events: none;
      max-width: 70%;
    }
    .post-description {
      font-size: 16px;
      line-height: 1.5;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      pointer-events: auto;
      word-wrap: break-word;
      max-height: 40vh;
      overflow-y: auto;
      color: #fff;
    }
    .post-description .hashtag { color: #60a5fa; font-weight: 500; }
    .post-actions-right {
      position: absolute;
      right: 12px;
      bottom: 100px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      pointer-events: none;
    }
    .post-actions-right .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      pointer-events: auto;
      transition: 0.2s;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    .post-actions-right .action-btn i { font-size: 28px; transition: 0.2s; }
    .post-actions-right .action-btn span { font-weight: 500; font-size: 12px; }
    .post-actions-right .action-btn.liked { color: #ef4444; }
    .post-actions-right .action-btn.liked i { transform: scale(1.1); }
    .post-actions-right .action-btn:hover { transform: scale(1.05); }
    .post-actions-right .action-btn:active { transform: scale(0.9); }
    .post-profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8);
      overflow: hidden;
      background: #3b82f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      pointer-events: auto;
      cursor: pointer;
      margin-bottom: 4px;
      flex-shrink: 0;
      transition: transform 0.2s;
      text-transform: uppercase;
      user-select: none;
    }
    .post-profile-avatar:hover { transform: scale(1.05); }
    .post-profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ===== IMAGE COUNTER ===== */
    .image-counter {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 20;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    /* ===== EMPTY FEED & LOADING ===== */
    .empty-feed {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 16px;
      background: #000;
      height: calc(100dvh - 70px - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .empty-feed i { font-size: 48px; margin-bottom: 16px; display: block; color: #444; }
    .empty-feed p { color: #888; }

    .loading-feed {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      background: #000;
      height: calc(100dvh - 70px - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .loading-feed i { font-size: 48px; margin-bottom: 16px; display: block; color: #3b82f6; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== SEARCH ===== */
    .search-view {
      flex: 1;
      width: 100%;
      background: #000;
      padding: 14px 14px 22px;
      overflow-y: auto;
      display: none;
      animation: fadeIn 0.28s ease;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .search-view::-webkit-scrollbar { display: none; }
    .search-view.active { display: block; }

    .search-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding: 10px 10px 12px;
      background: rgba(18, 18, 18, 0.92);
      border: 1px solid #202020;
      border-radius: 22px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .search-header .back-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #171717;
      border: 1px solid #262626;
      border-radius: 50%;
      font-size: 17px;
      color: #e7e7e7;
      cursor: pointer;
      padding: 0;
      transition: 0.2s ease;
    }
    .search-header .back-btn:hover {
      background: #202020;
      border-color: #2f2f2f;
      transform: translateX(-1px);
    }
    .search-header .back-btn:active { transform: scale(0.95); }

    .search-header input {
      flex: 1;
      min-width: 0;
      padding: 12px 16px;
      border: 1px solid #242424;
      border-radius: 18px;
      font-size: 15px;
      background: #0f0f0f;
      color: #fff;
      transition: 0.2s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }
    .search-header input:focus {
      border-color: #363636;
      background: #141414;
    }
    .search-header input::placeholder { color: #6f6f6f; }

    .search-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      padding: 5px;
      background: #101010;
      border: 1px solid #202020;
      border-radius: 18px;
    }
    .search-tab {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 12px;
      border-radius: 13px;
      color: #8d8d8d;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
      font-family: inherit;
      letter-spacing: 0.1px;
    }
    .search-tab.active {
      background: #1d1d1d;
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }
    .search-tab:hover:not(.active) { color: #d5d5d5; }

    .search-results {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 20px;
    }
    .search-result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(20, 20, 20, 0.96);
      border-radius: 18px;
      border: 1px solid #212121;
      cursor: pointer;
      transition: 0.2s ease;
      color: #eee;
      box-shadow: 0 8px 24px rgba(0,0,0,0.16);
    }
    .search-result-item:hover {
      background: #191919;
      border-color: #2b2b2b;
      transform: translateY(-1px);
    }
    .search-result-item:active { transform: scale(0.995); }
    .search-result-item img {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      object-fit: cover;
      background: #262626;
      flex-shrink: 0;
      border: 1px solid #2a2a2a;
    }
    .search-result-item .info {
      flex: 1;
      min-width: 0;
    }
    .search-result-item .info .desc {
      font-size: 14px;
      color: #f2f2f2;
      font-weight: 600;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .search-result-item .info .tags {
      font-size: 12px;
      color: #8a8a8a;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .search-empty {
      text-align: center;
      padding: 42px 20px;
      color: #8a8a8a;
      background: #111;
      border: 1px solid #202020;
      border-radius: 20px;
      margin-top: 4px;
    }
    .search-empty i {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 12px;
      color: #6f6f6f;
      background: #171717;
      border: 1px solid #242424;
    }
    .search-empty p {
      font-size: 14px;
      line-height: 1.4;
    }

    @media (max-width: 420px) {
      .search-view {
        padding: 12px 12px 18px;
      }
      .search-header {
        gap: 8px;
        padding: 9px;
        border-radius: 20px;
        margin-bottom: 12px;
      }
      .search-header .back-btn {
        width: 38px;
        height: 38px;
        font-size: 16px;
      }
      .search-header input {
        padding: 11px 14px;
        border-radius: 16px;
        font-size: 14px;
      }
      .search-tabs {
        gap: 5px;
        padding: 4px;
        border-radius: 16px;
        margin-bottom: 12px;
      }
      .search-tab {
        padding: 9px 10px;
        font-size: 12px;
        border-radius: 12px;
      }
      .search-result-item {
        gap: 10px;
        padding: 11px;
        border-radius: 16px;
      }
      .search-result-item img {
        width: 52px;
        height: 52px;
        border-radius: 13px;
      }
      .search-result-item .info .desc {
        font-size: 13px;
      }
      .search-result-item .info .tags {
        font-size: 11px;
      }
      .search-empty {
        padding: 34px 16px;
        border-radius: 18px;
      }
      .search-empty i {
        width: 52px;
        height: 52px;
        font-size: 20px;
        border-radius: 16px;
      }
    }


    /* ===== SEARCH GRID / MASONRY ===== */
    .search-results.posts-grid {
      display: block;
      column-count: 2;
      column-gap: 10px;
      padding-bottom: 20px;
    }

    .search-results.posts-grid .search-result-item {
      display: inline-block;
      width: 100%;
      margin: 0 0 10px;
      break-inside: avoid;
      -webkit-column-break-inside: avoid;
      page-break-inside: avoid;
      position: relative;
      overflow: hidden;
      border: none;
      border-radius: 18px;
      background: #111;
      box-shadow: none;
      padding: 0;
      cursor: pointer;
      min-height: 180px;
      aspect-ratio: 3 / 4;
      transform: none;
    }

    .search-results.posts-grid .search-result-item:hover {
      transform: translateY(-1px);
    }

    .search-results.posts-grid .search-result-item img,
    .search-results.posts-grid .search-result-item .search-post-media {
      width: 100%;
      height: 100%;
      display: block;
    }

    .search-results.posts-grid .search-result-item .search-post-media {
      position: relative;
      overflow: hidden;
      background: #111;
    }

    .search-results.posts-grid .search-result-item .search-post-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .search-results.posts-grid .search-result-item .search-post-placeholder {
      width: 100%;
      height: 100%;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      background: linear-gradient(180deg, #1a1a1a, #0d0d0d);
      font-size: 26px;
    }

    .search-results.posts-grid .search-result-item .search-post-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      padding: 12px 12px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.45) 45%, rgba(0,0,0,0) 100%);
      color: #fff;
      pointer-events: none;
    }

    .search-results.posts-grid .search-result-item .search-post-desc {
      font-size: 13px;
      line-height: 1.35;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.85);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    .search-results.posts-grid .search-result-item .search-post-tag {
      margin-top: 5px;
      font-size: 11px;
      color: rgba(255,255,255,0.82);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-results.posts-grid .search-result-item .info {
      display: none;
    }

    .search-results.users-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 20px;
    }

    @media (max-width: 420px) {
      .search-results.posts-grid {
        column-count: 2;
        column-gap: 8px;
      }

      .search-results.posts-grid .search-result-item {
        margin-bottom: 8px;
        border-radius: 16px;
        min-height: 150px;
      }

      .search-results.posts-grid .search-result-item .search-post-overlay {
        padding: 10px 10px 8px;
      }

      .search-results.posts-grid .search-result-item .search-post-desc {
        font-size: 12px;
        -webkit-line-clamp: 3;
      }

      .search-results.posts-grid .search-result-item .search-post-tag {
        font-size: 10px;
      }
    }


    .comments-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: flex-end;
      flex-direction: column;
      height: 100%;
      animation: fadeInOverlay 0.25s ease;
    }
    .comments-overlay.active { display: flex; }
    @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
    .comments-panel {
      background: #1a1a1a;
      border-radius: 24px 24px 0 0;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
      padding: 20px 20px 16px 20px;
      animation: slideUp 0.3s ease;
      color: #eee;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .comments-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }
    .comments-panel .panel-header h3 { font-size: 18px; color: #fff; }
    .comments-panel .panel-header .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #999;
      cursor: pointer;
      padding: 4px;
    }
    .comments-panel .panel-header .close-btn:hover { color: #fff; }
    .comments-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      max-height: 50vh;
    }
    .comment-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .comment-item .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #3b82f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
      font-weight: 600;
      text-transform: uppercase;
    }
    .comment-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-item .body { flex: 1; }
    .comment-item .body .author { font-weight: 600; font-size: 14px; color: #ddd; }
    .comment-item .body .text { font-size: 14px; color: #ccc; margin-top: 2px; word-wrap: break-word; }
    .comment-item .body .time { font-size: 11px; color: #777; margin-top: 2px; }
    .comments-input-area {
      display: flex;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid #333;
      margin-top: 4px;
    }
    .comments-input-area input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #333;
      border-radius: 30px;
      font-size: 14px;
      background: #111;
      color: #eee;
      transition: 0.2s;
    }
    .comments-input-area input:focus { border-color: #3b82f6; background: #1a1a1a; }
    .comments-input-area input::placeholder { color: #777; }
    .comments-input-area .send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .comments-input-area .send-btn:hover { background: #1d4ed8; transform: scale(1.05); }
    .no-comments { text-align: center; color: #888; padding: 30px 0; font-size: 14px; }

    /* ===== MUSIC PICKER (similar a comments) ===== */
    .music-picker-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2001;

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function buildRandomOrder(ids) {
      return shuffleArray([...ids]);
    }

    function insertNewPostInOrder(newPostId) {
      const pos = Math.floor(Math.random() * (postOrder.length + 1));
      postOrder.splice(pos, 0, newPostId);

          profileData.followers = data.followers || {};
          profileData.following = data.following || {};
          // Actualizar también el perfil en el almacén global
          userProfiles[uid] = data;
        } else {
          const defaultProfile = {
            name: 'Usuario',
            bio: '',
            avatar: null,
            verifiedSticker: null,
            likedPosts: [],
            followers: {},
            following: {}
          };
          profileRef.set(defaultProfile);
          Object.assign(profileData, defaultProfile);
          userProfiles[uid] = defaultProfile;
        }
        loadPostsFromFirebase();
        const profileView = document.getElementById('profileView');
        if (profileView) {
          const viewedUid = profileView.dataset.uid;
          if (viewedUid === currentUserId) {
            showProfile(currentUserId);
          }
        }
      });
    }

    // ============================================================
    //  FIREBASE POSTS
    // ============================================================
    function loadPostsFromFirebase() {
      const postsRef = database.ref('posts');
      postsRef.off();
      postsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          const postsArray = Object.keys(data).map(key => ({
            id: key,
            ...data[key]
          }));
          posts = postsArray;
        } else {
          posts = [];
        }

        if (profileData.likedPosts && profileData.likedPosts.length > 0) {
          posts.forEach(post => {
            post.liked = profileData.likedPosts.includes(post.id);
          });
        } else {
          posts.forEach(post => post.liked = false);
        }

        const currentIds = posts.map(p => p.id);
        if (postOrder.length === 0) {
          postOrder = buildRandomOrder(currentIds);
        } else {
          postOrder = postOrder.filter(id => currentIds.includes(id));
          const newIds = currentIds.filter(id => !postOrder.includes(id));
          newIds.forEach(id => insertNewPostInOrder(id));
        }

        posts.sort((a, b) => {
          const indexA = postOrder.indexOf(a.id);
          const indexB = postOrder.indexOf(b.id);
          return indexA - indexB;
        });

        isPostsLoading = false;

        // Cargar perfiles de los autores si no están cargados
        if (!profilesLoaded) {
          const authorUids = [...new Set(posts.map(p => p.authorUid || p.authorId).filter(id => id && id !== 'unknown'))];
          if (authorUids.length > 0) {
            database.ref('users').once('value').then(snapshot => {
              const data = snapshot.val();
              if (data) {
                Object.keys(data).forEach(uid => {
                  userProfiles[uid] = data[uid];
                });
              }
              profilesLoaded = true;
              // Actualizar feed si está visible
              if (document.getElementById('feedContainer')) {
                updateFeedContainer();
              }
            }).catch(err => console.warn('Error cargando perfiles:', err));
          } else {
            profilesLoaded = true;
          }
        }

        // Si el feed está visible, actualizarlo
        if (document.getElementById('feedContainer')) {
          updateFeedContainer();
        }
        // Actualizar perfil si está visible
        const profileView = document.getElementById('profileView');
        if (profileView) {
          const viewedUid = profileView.dataset.uid;
          if (viewedUid === currentUserId) {
            showProfile(currentUserId);
          }
        }
      });
    }

    // ============================================================

    function updateDownloadSelectionCounter(totalImages) {
      if (!downloadSelectedCount) return;
      const selected = downloadImageScroll ? downloadImageScroll.querySelectorAll('.image-item.selected').length : 0;
      downloadSelectedCount.textContent = `${selected}/${totalImages}`;
    }

    function showDownloadDialog(postId) {
      const post = posts.find(p => p.id === postId);
      if (!post) return;

      let images = [];
      if (post.images && Array.isArray(post.images) && post.images.length > 0) {
        images = post.images;
      } else if (post.imageUrl) {
        images = [post.imageUrl];
      } else {
        return;
      }

      downloadImageScroll.innerHTML = '';
      images.forEach((url, index) => {
        const item = document.createElement('div');
        const shouldStartSelected = images.length === 1 ? true : index !== 0; // deja una miniatura sin seleccionar por defecto
        item.className = 'image-item' + (shouldStartSelected ? ' selected' : '');
        item.dataset.index = index;
        item.dataset.selected = shouldStartSelected ? 'true' : 'false';

        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.style.backgroundImage = `url('${url}')`;

        item.appendChild(thumb);

        item.addEventListener('click', function() {
          const isSelected = this.classList.toggle('selected');
          this.dataset.selected = isSelected ? 'true' : 'false';
          updateDownloadSelectionCounter(images.length);
        });

        downloadImageScroll.appendChild(item);
      });

      downloadOverlay.classList.add('active');
      downloadConfirmBtn.dataset.postId = postId;
      downloadImageScroll.scrollLeft = 0;
      updateDownloadSelectionCounter(images.length);
    }

    function closeDownloadDialog() {
      downloadOverlay.classList.remove('active');
      if (downloadSelectedCount) downloadSelectedCount.textContent = '0/0';
    }

    async function downloadSelectedImages() {
      const items = downloadImageScroll.querySelectorAll('.image-item.selected');
      const selected = [];
      items.forEach(item => {
        const idx = parseInt(item.dataset.index, 10);
        if (!isNaN(idx)) {
          selected.push(idx);
        }
      });

      if (selected.length === 0) {
        alert('No has seleccionado ninguna imagen.');
        return;
      }

      const postId = downloadConfirmBtn.dataset.postId;
      const post = posts.find(p => p.id === postId);
      if (!post) return;

      let images = [];
      if (post.images && Array.isArray(post.images) && post.images.length > 0) {
        images = post.images;
      } else if (post.imageUrl) {
        images = [post.imageUrl];
      }

      const urlsToDownload = selected.map(idx => images[idx]).filter(Boolean);
      if (urlsToDownload.length === 0) {
        alert('No se seleccionaron imágenes válidas.');
        return;
      }

      for (let i = 0; i < urlsToDownload.length; i++) {
        const url = urlsToDownload[i];
        try {
          const response = await fetch(url);
          const blob = await response.blob();
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          const ext = blob.type.split('/')[1] || 'jpg';
          link.download = `imagen_${i+1}.${ext}`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          await new Promise(r => setTimeout(r, 100));
        } catch (err) {
          console.warn('Error al descargar imagen:', err);
          alert(`Error al descargar la imagen ${i+1}.`);
        }
      }

      closeDownloadDialog();
    }

    // ============================================================
    //  CREAR POST CARD
    // ============================================================
    function createPostCard(post) {
      const postCard = document.createElement('div');
      postCard.className = 'post-card';
      postCard.dataset.postId = post.id;

      let images = [];
      if (post.images && Array.isArray(post.images) && post.images.length > 0) {
        images = post.images;
      } else if (post.imageUrl) {
        images = [post.imageUrl];
      }

      const carousel = document.createElement('div');
      carousel.className = 'post-image-carousel';

      if (images.length === 0) {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.style.background = '#111';
        slide.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-size:48px;"><i class="fas fa-image"></i></div>';
        carousel.appendChild(slide);
      } else {
        images.forEach(url => {
          const slide = document.createElement('div');
          slide.className = 'carousel-slide';
          slide.style.backgroundImage = `url('${url}')`;
          carousel.appendChild(slide);
        });
      }
      postCard.appendChild(carousel);

      carousel.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleMusicPlayback();
      });

      let pressTimer = null;
      const startPress = function(e) {
        pressTimer = setTimeout(() => {
          const postId = this.closest('.post-card').dataset.postId;
          showDownloadDialog(postId);
        }, 500);
      };
      const endPress = function(e) {
        clearTimeout(pressTimer);
      };
      const cancelPress = function(e) {
        clearTimeout(pressTimer);
      };
      carousel.addEventListener('touchstart', startPress, { passive: true });
      carousel.addEventListener('touchend', endPress, { passive: true });
      carousel.addEventListener('touchcancel', cancelPress, { passive: true });
      carousel.addEventListener('mousedown', function(e) {
        if (e.button === 0) {
          startPress.call(this, e);
        }
      });
      carousel.addEventListener('mouseup', function(e) {
        if (e.button === 0) {
          endPress.call(this, e);
        }
      });
      carousel.addEventListener('mouseleave', function(e) {
        cancelPress.call(this, e);
      });

      if (images.length > 1) {
        const counter = document.createElement('div');
        counter.className = 'image-counter';
        counter.textContent = `1/${images.length}`;
        counter.dataset.total = images.length;
        postCard.appendChild(counter);
        carousel.addEventListener('scroll', function() {
          const total = parseInt(counter.dataset.total, 10);
          const slideWidth = this.querySelector('.carousel-slide')?.offsetWidth || 1;
          const scrollLeft = this.scrollLeft;
          const index = Math.round(scrollLeft / slideWidth) + 1;
          counter.textContent = `${Math.min(index, total)}/${total}`;
        });
      }

      const authorUid = post.authorUid || post.authorId || 'unknown';
      const authorName = post.authorName || 'Usuario';

      // Obtener avatar desde el perfil almacenado (si existe)
      let displayAvatar = null;
      if (authorUid === currentUserId) {
        // Usuario actual: usar profileData (siempre actualizado)
        displayAvatar = profileData.avatar;
      } else if (userProfiles[authorUid]) {
        displayAvatar = userProfiles[authorUid].avatar;
      }

      let avatarContent = '';
      if (displayAvatar) {
        avatarContent = `<img src="${displayAvatar}" alt="Avatar" />`;
      } else {
        const initials = authorName.split(' ').map(word => word[0]).join('').toUpperCase().slice(0, 2);
        const hue = Math.abs(authorName.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) * 137) % 360;
        avatarContent = `<span style="background:hsl(${hue}, 70%, 50%); display:flex; align-items:center; justify-content:center; width:100%; height:100%; border-radius:50%; font-size:20px; font-weight:600; color:white;">${initials || '?'}</span>`;
      }

      const likedClass = post.liked ? 'liked' : '';
      const commentCount = post.comments ? post.comments.length : 0;

      let descHtml = post.description || 'Sin descripción';
      descHtml = descHtml.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>');

      const bottomLeft = document.createElement('div');
      bottomLeft.className = 'post-bottom-left';
      bottomLeft.innerHTML = `<div class="post-description">${descHtml}</div>`;

      const actionsRight = document.createElement('div');
      actionsRight.className = 'post-actions-right';
      actionsRight.innerHTML = `
        <div class="post-profile-avatar" data-author-uid="${authorUid}">${avatarContent}</div>
        <button class="action-btn like-btn ${likedClass}" data-post-id="${post.id}">

    function delay(ms) {
      return new Promise(function(resolve) {
        setTimeout(resolve, ms);
      });
    }

    function extractBase64FromDataUrl(imageDataUrl) {
      if (typeof imageDataUrl !== 'string') return '';
      const commaIndex = imageDataUrl.indexOf(',');
      if (commaIndex === -1) return '';
      return imageDataUrl.slice(commaIndex + 1);
    }

    function sanitizeFileName(fileName) {
      const base = String(fileName || 'image.jpg').trim();
      return base.replace(/[^a-zA-Z0-9._-]+/g, '_');
    }

    async function postImageToImgbb(payload, errorLabel) {
      const response = await fetch(IMGBB_UPLOAD_URL, {
        method: 'POST',
        body: payload
      });

      const responseText = await response.text();
      let data = null;

      try {
        data = JSON.parse(responseText);
      } catch (parseErr) {
        throw new Error('ImgBB devolvió una respuesta no válida' + (errorLabel ? ' (' + errorLabel + ')' : '') + '.');
      }

      if (response.ok && data && data.success && data.data && data.data.url) {
        return data.data.url;
      }

      const apiMessage = data && data.error && data.error.message ? data.error.message : 'Respuesta inválida de ImgBB';
      throw new Error(apiMessage + (errorLabel ? ' (' + errorLabel + ')' : ''));
    }

    async function uploadImageOnceToImgbb(imageDataUrl, fileName) {
      if (typeof imageDataUrl !== 'string' || !imageDataUrl.trim()) {
        throw new Error('La imagen no tiene un formato válido.');
      }

      const safeFileName = sanitizeFileName(fileName || 'image.jpg');
      const base64 = extractBase64FromDataUrl(imageDataUrl);

      try {
        const sourceResponse = await fetch(imageDataUrl);
        if (!sourceResponse.ok) {
          throw new Error('No se pudo leer la imagen (' + sourceResponse.status + ').');
        }

        const blob = await sourceResponse.blob();
        const formData = new FormData();
        formData.append('key', IMGBB_API_KEY);
        formData.append('image', blob, safeFileName);
        formData.append('name', safeFileName.replace(/\.[^.]+$/, ''));

        try {
          return await postImageToImgbb(formData, 'blob');
        } catch (blobErr) {
          if (!base64) throw blobErr;
          const fallbackForm = new FormData();
          fallbackForm.append('key', IMGBB_API_KEY);
          fallbackForm.append('image', base64);
          fallbackForm.append('name', safeFileName.replace(/\.[^.]+$/, ''));
          return await postImageToImgbb(fallbackForm, 'base64');
        }
      } catch (sourceErr) {
        if (!base64) throw sourceErr;

        const fallbackForm = new FormData();
        fallbackForm.append('key', IMGBB_API_KEY);
        fallbackForm.append('image', base64);
        fallbackForm.append('name', safeFileName.replace(/\.[^.]+$/, ''));
        return await postImageToImgbb(fallbackForm, 'base64');
      }
    }

    async function uploadImageToImgbb(imageDataUrl, fileName) {
      let lastError = null;

      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          return await uploadImageOnceToImgbb(imageDataUrl, fileName);
        } catch (err) {
          lastError = err;
          if (attempt < 3) {
            await delay(450 * attempt);
          }
        }
      }

      throw lastError || new Error('Error en ImgBB');
    }

    async function uploadMultipleImages(imagesData) {
      const urls = [];

      if (!imagesData || imagesData.length === 0) {
        return urls;
      }

      for (let i = 0; i < imagesData.length; i++) {
        const loadingMsg = document.querySelector('.upload-progress-msg');
        if (loadingMsg) {
          loadingMsg.textContent = 'Subiendo imagen ' + (i + 1) + ' de ' + imagesData.length + '...';
        }

        const fileName = 'post_' + Date.now() + '_' + (i + 1) + '.jpg';
        const url = await uploadImageToImgbb(imagesData[i], fileName);
        urls.push(url);
      }

      return urls;
    }

    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      const hue = Math.abs(hash) % 360;
      return `hsl(${hue}, 70%, 50%)`;
    }

    function getMusicIconCandidates(item) {
      const candidates = [];
      const add = (value) => {
        if (value && !candidates.includes(value)) candidates.push(value);
      };

      add(item && item.icon);
      add(item && item.iconUrl);
      add(item && item.image);
      add(item && item.cover);
      add(item && item.thumbnail);

      const fileName = (item && item.file ? String(item.file) : '').split('/').pop().split('?')[0];
      if (fileName) {
        const base = fileName.replace(/\.[^.]+$/, '');
        const encodedBase = encodeURIComponent(base);
        const rawRoot = 'https://raw.githubusercontent.com/SterlingPlus-Studio/Musica/main/Icono/';
        ['png', 'jpg', 'jpeg', 'webp'].forEach(ext => add(`${rawRoot}${encodedBase}.${ext}`));
        ['png', 'jpg', 'jpeg', 'webp'].forEach(ext => add(`Icono/${encodedBase}.${ext}`));
      }

      return candidates;
    }


    function resetMusicPreview() {
      if (musicPreviewButton) {
        musicPreviewButton.classList.remove('playing');
        musicPreviewButton.innerHTML = '<i class="fas fa-play"></i>';

      musicPreviewUrl = '';

    function toggleMusicPreview(item, button, event) {
      if (event) event.stopPropagation();
      if (!item || !item.value) return;

      if (musicPreviewUrl === item.value && !musicPickerPreviewAudio.paused) {
        resetMusicPreview();
        return;
      }

      if (musicPreviewButton && musicPreviewButton !== button) {
        musicPreviewButton.classList.remove('playing');
        musicPreviewButton.innerHTML = '<i class="fas fa-play"></i>';
      }

      musicPreviewButton = button;
      musicPreviewUrl = item.value;

      musicPickerPreviewAudio.pause();
      musicPickerPreviewAudio.src = item.value;
      musicPickerPreviewAudio.currentTime = 0;

      const playPromise = musicPickerPreviewAudio.play();
      if (playPromise && typeof playPromise.then === 'function') {
        playPromise.then(function() {
          if (musicPreviewButton === button) {
            button.classList.add('playing');
            button.innerHTML = '<i class="fas fa-pause"></i>';
          }
        }).catch(function(err) {
          console.warn('No se pudo reproducir la vista previa:', err);
          if (musicPreviewButton === button) {
            button.classList.remove('playing');
            button.innerHTML = '<i class="fas fa-play"></i>';
          }
        });
      } else {
        button.classList.add('playing');
        button.innerHTML = '<i class="fas fa-pause"></i>';
      }

      musicPickerPreviewAudio.onended = function() {
        if (musicPreviewButton === button) {
          button.classList.remove('playing');
          button.innerHTML = '<i class="fas fa-play"></i>';
          musicPreviewButton = null;
          musicPreviewUrl = '';
        }
      };
    }

    function renderMusicCover(coverEl, item, fallbackHtml) {
      if (!coverEl) return;

      const label = item && item.label ? item.label : 'Sin música';
      const color = label !== 'Sin música' ? stringToColor(label) : '#444';
      const candidates = getMusicIconCandidates(item);

      coverEl.style.background = color;

      if (!candidates.length) {
        coverEl.innerHTML = fallbackHtml;
        return;
      }

      const img = document.createElement('img');
      let index = 0;

      const tryNext = () => {
        if (index >= candidates.length) {
          coverEl.innerHTML = fallbackHtml;
          coverEl.style.background = color;
          return;
        }
        img.src = candidates[index++];
      };

      img.onerror = tryNext;
      img.onload = () => {
        coverEl.innerHTML = '';
        coverEl.appendChild(img);
      };

      tryNext();
    }

    // ============================================================
    function playFeedMusic(postId, url) {
      if (!url) return;
      if (globalAudio.src === url && !globalAudio.paused) return;
      stopAllMusic();
      if (globalAudio.src !== url) {
        globalAudio.src = url;
        globalAudio.load();
      } else {
        globalAudio.currentTime = 0;
      }

      const playFn = () => {
        globalAudio.play().then(() => {
          currentFeedAudioPostId = postId;
          isPlaying = true;
        }).catch(err => {
          console.warn('Error al reproducir en feed:', err);
          currentFeedAudioPostId = null;
          isPlaying = false;
        });
      };

      if (globalAudio.readyState >= 2) {
        playFn();
      } else {
        globalAudio.addEventListener('canplaythrough', playFn, { once: true });
        setTimeout(() => {
          if (currentFeedAudioPostId !== postId) {
            globalAudio.removeEventListener('canplaythrough', playFn);
            playFn();
          }
        }, 3000);
      }
    }

    function tryAutoPlayFirstMusic() {
      if (autoPlayAttempted) return;
      if (posts.length === 0) return;
      const firstWithMusic = posts.find(p => p.musicUrl);
      if (firstWithMusic) {
        autoPlayAttempted = true;
        playFeedMusic(firstWithMusic.id, firstWithMusic.musicUrl);
        const playOnInteraction = function() {
          if (!isPlaying && globalAudio.src) {
            globalAudio.play().then(() => {
              isPlaying = true;
              if (firstWithMusic) currentFeedAudioPostId = firstWithMusic.id;
            }).catch(() => {});
          }
          document.removeEventListener('click', playOnInteraction);
          document.removeEventListener('touchstart', playOnInteraction);
        };
        document.addEventListener('click', playOnInteraction, { once: true });
        document.addEventListener('touchstart', playOnInteraction, { once: true });
      }
    }

    function setupFeedAutoPlay() {
      if (feedObserver) {
        feedObserver.disconnect();
        feedObserver = null;
      }
      const container = document.getElementById('feedContainer');
      if (!container) return;
      feedObserver = new IntersectionObserver((entries) => {
        let mostVisiblePost = null;
        let maxRatio = 0;
        entries.forEach(entry => {
          if (entry.isIntersecting && entry.intersectionRatio > maxRatio) {
            maxRatio = entry.intersectionRatio;
            mostVisiblePost = entry.target;
          }
        });
        if (mostVisiblePost) {
          const postId = mostVisiblePost.dataset.postId;
          const post = posts.find(p => p.id === postId);
          if (post && post.musicUrl) {
            if (currentFeedAudioPostId !== postId) {
              playFeedMusic(postId, post.musicUrl);
            }
          } else {
            const visibleCards = container.querySelectorAll('.post-card');
            let nextWithMusic = null;
            for (let card of visibleCards) {
              const id = card.dataset.postId;
              const p = posts.find(po => po.id === id);
              if (p && p.musicUrl) {
                nextWithMusic = p;
                break;
              }
            }
            if (nextWithMusic && nextWithMusic.id !== currentFeedAudioPostId) {
              playFeedMusic(nextWithMusic.id, nextWithMusic.musicUrl);
            } else if (!nextWithMusic) {
              stopAllMusic();
            }
          }
        } else {
          stopAllMusic();
        }
      }, {
        threshold: [0.3, 0.5, 0.7],
        root: mainContent,
        rootMargin: '0px'
      });
      document.querySelectorAll('.post-card').forEach(card => {
        feedObserver.observe(card);
      });
    }

    function updateLikeInDOM(postId, isLiked, newLikes) {
      const postCard = document.querySelector(`.post-card[data-post-id="${postId}"]`);
      if (!postCard) return;
      const likeBtn = postCard.querySelector('.like-btn');
      const likeCount = postCard.querySelector('.like-count');

    function toggleLike(postId) {
      const post = posts.find(p => p.id === postId);
      if (!post) return;
      const isLiked = post.liked;
      const newLiked = !isLiked;
      const newLikes = (post.likes || 0) + (newLiked ? 1 : -1);

      post.liked = newLiked;
      post.likes = newLikes;

      let updatedLikedPosts = [...profileData.likedPosts];
      if (newLiked) {
        if (!updatedLikedPosts.includes(postId)) {
          updatedLikedPosts.push(postId);
        }
      } else {
        updatedLikedPosts = updatedLikedPosts.filter(id => id !== postId);
      }
      profileData.likedPosts = updatedLikedPosts;

      updateLikeInDOM(postId, newLiked, newLikes);

      isUpdatingLike = true;

      const updates = { likedPosts: updatedLikedPosts };
      updateUserProfile(auth.currentUser.uid, updates)
        .then(() => {
          return updatePostInFirebase(postId, { likes: newLikes });
        })
        .then(() => {
          isUpdatingLike = false;
        })
        .catch(err => {
          console.warn('Error al actualizar like:', err);
          post.liked = isLiked;
          post.likes = (post.likes || 0) + (newLiked ? -1 : 1);
          profileData.likedPosts = isLiked ? [...profileData.likedPosts, postId] : profileData.likedPosts.filter(id => id !== postId);
          updateLikeInDOM(postId, isLiked, post.likes);
          isUpdatingLike = false;
        });
    }

    function addComment() {
      const text = commentInput.value.trim();
      if (!text || currentCommentPostId === null) return;
      const post = posts.find(p => p.id === currentCommentPostId);
      if (!post) return;
      if (!post.comments) post.comments = [];
      const newComment = {
        author: profileData.name,
        text: text,
        timestamp: new Date().toLocaleString(),
        avatar: profileData.avatar || null
      };
      post.comments.push(newComment);
      updatePostInFirebase(post.id, {
        comments: post.comments

      renderComments(post.comments);
      commentInput.value = '';
      const commentCountSpan = document.querySelector(`.post-card[data-post-id="${post.id}"] .comment-count`);
      if (commentCountSpan) {

    // ---- BÚSQUEDA ----
    let searchActiveTab = 'posts';
    let searchQuery = '';

    function showSearchView() {
      saveFeedScrollPosition();
      stopAllMusic();
      closeComments();
      clearMainContent();
      showTopBar(false);

      const container = document.createElement('div');
      container.className = 'search-view active';
      container.id = 'searchView';

      container.innerHTML = `
        <div class="search-header">
          <button class="back-btn" id="searchBackBtn"><i class="fas fa-arrow-left"></i></button>
          <input type="text" id="searchInput" placeholder="Buscar..." autofocus />
        </div>
        <div class="search-tabs">
          <button class="search-tab active" data-tab="posts">Publicaciones</button>
          <button class="search-tab" data-tab="users">Usuarios</button>
        </div>
        <div class="search-results" id="searchResults">
        </div>
      `;

      mainContent.appendChild(container);

      const searchInput = document.getElementById('searchInput');
      const searchResults = document.getElementById('searchResults');
      const tabs = container.querySelectorAll('.search-tab');

      function getRandomSuggestions(type) {
        const results = [];
        if (type === 'posts') {
          const shuffled = shuffleArray([...posts]);
          const sliced = shuffled.slice(0, 10);
          sliced.forEach(post => {
            let imgSrc = '';
            if (post.images && post.images.length > 0) imgSrc = post.images[0];
            else if (post.imageUrl) imgSrc = post.imageUrl;
            results.push({
              id: post.id,
              image: imgSrc,
              desc: post.description || 'Sin descripción',
              music: post.musicTitle || ''
            });
          });
        } else {
          const userSet = new Map();
          posts.forEach(post => {
            if (post.authorUid && post.authorUid !== 'unknown') {
              if (!userSet.has(post.authorUid)) {
                userSet.set(post.authorUid, {
                  uid: post.authorUid,
                  name: post.authorName || 'Usuario',
                  avatar: post.authorAvatar || null,
                  bio: ''
                });
              }
            }
          });
          const usersArray = Array.from(userSet.values());
          const shuffled = shuffleArray(usersArray);
          const sliced = shuffled.slice(0, 10);
          sliced.forEach(user => {
            results.push({
              uid: user.uid,
              name: user.name,
              avatar: user.avatar,
              bio: ''
            });
          });
        }
        return results;
      }


      function getSearchPreviewText(item) {
        const baseText = (item.desc || item.description || item.name || 'Sin descripción').toString().trim();
        return baseText.length > 72 ? baseText.substring(0, 72) + '...' : baseText;
      }

      function getSearchPostImage(item) {
        if (!item) return '';
        if (item.image) return item.image;
        if (item.imageUrl) return item.imageUrl;
        if (item.images && item.images.length > 0) return item.images[0];
        return '';
      }

      function buildSearchPostCard(item, postId) {
        const imageSrc = getSearchPostImage(item);
        const previewText = getSearchPreviewText(item);
        const musicText = (item.music || item.musicTitle || '').toString().trim();
        return `
          <div class="search-result-item search-post-card" data-post-id="${postId}">
            <div class="search-post-media ${imageSrc ? '' : 'empty'}">
              ${imageSrc ? `<img src="${imageSrc}" alt="Preview" />` : `<div class="search-post-placeholder"><i class="fas fa-image"></i></div>`}
            </div>
            <div class="search-post-overlay">
              <div class="search-post-desc">${previewText}</div>
              ${musicText ? `<div class="search-post-tag">🎵 ${musicText}</div>` : ''}
            </div>
          </div>
        `;
      }


      function renderSearchResults(query) {
        const tab = searchActiveTab;
        const resultsContainer = document.getElementById('searchResults');
        if (!resultsContainer) return;

        resultsContainer.className = `search-results ${tab === 'posts' ? 'posts-grid' : 'users-list'}`;

        if (query.length === 0) {
          const suggestions = getRandomSuggestions(tab);
          if (suggestions.length === 0) {
            resultsContainer.innerHTML = `
              <div class="search-empty">
                <i class="fas fa-search"></i>
                <p>No hay sugerencias disponibles</p>
              </div>
            `;
            return;
          }

          let html = '';
          if (tab === 'posts') {
            suggestions.forEach(item => {
              html += buildSearchPostCard(item, item.id);
            });
          } else {
            suggestions.forEach(item => {
              const avatarHtml = item.avatar
                ? `<img src="${item.avatar}" alt="Avatar" />`
                : `<div style="width:60px;height:60px;border-radius:12px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;color:#555;font-size:24px;"><i class="fas fa-user"></i></div>`;
              html += `
                <div class="search-result-item" data-uid="${item.uid}">
                  ${avatarHtml}
                  <div class="info">
                    <div class="desc">${item.name}</div>
                    <div class="tags">${item.bio || ''}</div>
                  </div>
                </div>
              `;
            });
          }

          resultsContainer.innerHTML = html;
          resultsContainer.querySelectorAll('.search-result-item').forEach(el => {
            if (el.dataset.postId) {
              el.addEventListener('click', function() {
                const postId = this.dataset.postId;
                closeSearchAndGoToPost(postId);
              });
            } else if (el.dataset.uid) {
              el.addEventListener('click', function() {
                const uid = this.dataset.uid;
                if (uid) {
                  closeSearch();
                  showUserProfile(uid);
                }
              });
            }
          });
          return;
        }

        performSearch(query);
      }

      tabs.forEach(tab => {

        tab.addEventListener('click', function() {
          tabs.forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          searchActiveTab = this.dataset.tab;
          renderSearchResults(searchInput.value.trim());
        });
      });

      searchInput.addEventListener('input', function() {
        searchQuery = this.value.trim();
        renderSearchResults(searchQuery);
      });

      document.getElementById('searchBackBtn').addEventListener('click', closeSearch);

      renderSearchResults('');
      setTimeout(() => searchInput.focus(), 100);
    }


    function performSearch(query) {
      const searchResults = document.getElementById('searchResults');
      if (!searchResults) return;
      if (query.length === 0) return;

      if (searchActiveTab === 'posts') {
        searchResults.className = 'search-results posts-grid';

        const results = posts.filter(post => {
          const desc = (post.description || '').toLowerCase();
          return desc.includes(query.toLowerCase());
        });

        if (results.length === 0) {
          searchResults.innerHTML = `
            <div class="search-empty">
              <i class="fas fa-times-circle"></i>
              <p>No se encontraron publicaciones con "${query}"</p>
            </div>
          `;
          return;
        }

        let html = '';
        results.forEach(post => {
          html += buildSearchPostCard(post, post.id);
        });

        searchResults.innerHTML = html;

        searchResults.querySelectorAll('.search-result-item').forEach(item => {
          item.addEventListener('click', function() {
            const postId = this.dataset.postId;
            closeSearchAndGoToPost(postId);
          });
        });
      } else {
        searchResults.className = 'search-results users-list';

        searchUsers(query).then(users => {
          if (users.length === 0) {
            searchResults.innerHTML = `
              <div class="search-empty">
                <i class="fas fa-users-slash"></i>
                <p>No se encontraron usuarios con "${query}"</p>
              </div>
            `;
            return;
          }

          let html = '';
          users.forEach(user => {
            const avatarHtml = user.avatar
              ? `<img src="${user.avatar}" alt="Avatar" />`
              : `<div style="width:60px;height:60px;border-radius:12px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;color:#555;font-size:24px;"><i class="fas fa-user"></i></div>`;
            html += `
              <div class="search-result-item" data-uid="${user.uid}">
                ${avatarHtml}
                <div class="info">
                  <div class="desc">${user.name}</div>
                  <div class="tags">${user.bio || ''}</div>
                </div>
              </div>
            `;
          });
          searchResults.innerHTML = html;

          searchResults.querySelectorAll('.search-result-item').forEach(item => {
            item.addEventListener('click', function() {
              const uid = this.dataset.uid;
              if (uid) {
                closeSearch();
                showUserProfile(uid);
              }
            });
          });
        }).catch(err => {
          console.warn('Error al buscar usuarios:', err);
          searchResults.innerHTML = `
            <div class="search-empty">
              <i class="fas fa-exclamation-triangle"></i>
              <p>Error al buscar usuarios</p>
            </div>
          `;
        });
      }
    }

    function searchUsers(query) {

      return new Promise((resolve, reject) => {
        if (!query || query.length < 1) {
          resolve([]);
          return;
        }
        const usersRef = database.ref('users');
        const searchTerm = query.toLowerCase();
        usersRef.orderByChild('name').startAt(query).endAt(query + '\uf8ff').once('value')
          .then(snapshot => {
            const data = snapshot.val();
            if (!data) {
              resolve([]);
              return;
            }
            const results = [];
            Object.keys(data).forEach(uid => {
              const user = data[uid];
              if (user.name && user.name.toLowerCase().includes(searchTerm)) {
                results.push({
                  uid: uid,
                  name: user.name || 'Usuario',
                  bio: user.bio || '',
                  avatar: user.avatar || null
                });
              }
            });
            resolve(results);
          })
          .catch(err => reject(err));
      });
    }

    function closeSearch() {
      const searchView = document.getElementById('searchView');
      if (searchView) searchView.remove();
      showHome();
    }

    function closeSearchAndGoToPost(postId) {
      const searchView = document.getElementById('searchView');
      if (searchView) searchView.remove();
      showHome();
      setTimeout(() => {
        const cards = document.querySelectorAll('.post-card');
        let targetCard = null;
        cards.forEach(card => {
          if (card.dataset.postId === postId) {
            targetCard = card;
          }
        });
        if (targetCard) {
          targetCard.scrollIntoView({ block: 'start' });
        }
      }, 300);
    }

    // ============================================================
    //  CREAR POST
    // ============================================================
    
function createPost(imagesData, description, musicUrl, musicTitle) {
      const publishBtn = document.getElementById('createPublishBtn');
      const originalPublishText = publishBtn ? publishBtn.innerHTML : 'Publicar';

      if (publishBtn) {
        publishBtn.disabled = true;
        publishBtn.innerHTML = 'Publicando...';
      }

      const loadingMsg = document.createElement('div');
      loadingMsg.className = 'upload-progress-msg';
      loadingMsg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);color:white;padding:20px 30px;border-radius:16px;z-index:9999;font-size:16px;text-align:center;';
      loadingMsg.innerHTML = `Subiendo imagen 0 de ${imagesData.length}...`;
      document.body.appendChild(loadingMsg);

      uploadMultipleImages(imagesData)
        .then(imageUrls => {
          loadingMsg.textContent = 'Guardando publicación...';
          const postData = {
            images: imageUrls,
            description: description.trim() || 'Sin descripción',
            musicUrl: musicUrl || '',
            musicTitle: musicTitle || '',
            likes: 0,
            liked: false,
            comments: [],
            timestamp: Date.now(),
            authorName: profileData.name,
            authorUid: auth.currentUser.uid
            // authorAvatar ya no se guarda, se obtiene del perfil
          };
          return savePostToFirebase(postData);
        })
        .then(() => {
          loadingMsg.remove();
          showHome();
        })
        .catch(err => {
          loadingMsg.remove();
          alert('Error al publicar: ' + err.message);
          console.error(err);
        })
        .finally(() => {
          if (publishBtn) {
            publishBtn.disabled = false;
            publishBtn.innerHTML = originalPublishText;
          }
        });
    }

      document.getElementById('musicSelectBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        openMusicPicker();
      });

      function updateImageGrid() {
        const grid = document.getElementById('createImagesGrid');
        const count = document.getElementById('createImageCount');
        if (!grid) return;

        if (count) {
          count.textContent = selectedImagesData.length + (selectedImagesData.length === 1 ? ' imagen' : ' imágenes');
        }

        grid.innerHTML = '';

        if (selectedImagesData.length === 0) {
          grid.innerHTML = `
            <div class="create-images-placeholder" id="createImagesPlaceholder">
              <i class="fas fa-images"></i>
              <span>Selecciona las imágenes que quieres compartir</span>
            </div>
          `;
          const placeholder = document.getElementById('createImagesPlaceholder');
          if (placeholder) {
            placeholder.addEventListener('click', function() {
              document.getElementById('createImageInput').click();
            });
          }
          return;
        }

        selectedImagesData.forEach(function(dataUrl, index) {
          const item = document.createElement('div');
          item.className = 'create-image-item';
          item.style.backgroundImage = `url('${dataUrl}')`;

          const removeBtn = document.createElement('button');
          removeBtn.className = 'remove-btn';
          removeBtn.innerHTML = '<i class="fas fa-times"></i>';
          removeBtn.setAttribute('aria-label', 'Eliminar imagen');

          removeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            selectedImagesData.splice(index, 1);
            updateImageGrid();
          });

          item.appendChild(removeBtn);
          grid.appendChild(item);
        });
      }

      const selectImageBtn = document.getElementById('selectImageBtn');
      const createImageInput = document.getElementById('createImageInput');

      function readFileAsDataUrl(file) {
        return new Promise(function(resolve, reject) {
          const reader = new FileReader();
          reader.onload = function(ev) { resolve(ev.target.result); };
          reader.onerror = function() { reject(new Error('No se pudo leer la imagen.')); };
          reader.readAsDataURL(file);
        });
      }

      selectImageBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        createImageInput.value = '';
        createImageInput.click();
      });

      createImageInput.addEventListener('change', async function(e) {
        const files = Array.from(e.target.files || []);
        if (!files.length) return;

        try {
          const loadedImages = await Promise.all(files.map(function(file) {
            return readFileAsDataUrl(file);
          }));
          selectedImagesData = selectedImagesData.concat(loadedImages);
          updateImageGrid();
        } catch (err) {
          console.warn('Error al cargar imágenes seleccionadas:', err);
          alert('No se pudieron agregar todas las imágenes seleccionadas.');
        } finally {
          this.value = '';
        }
      });

      document.getElementById('createBackBtn').addEventListener('click', function() {
        stopAllMusic();
        showHome();
      });

      document.getElementById('createPublishBtn').addEventListener('click', function() {
        if (selectedImagesData.length === 0) {
          alert('Por favor, selecciona al menos una imagen.');
          return;
        }

        const description = document.getElementById('createDescInput').value.trim() || 'Sin descripción';
        const selectBtn = document.getElementById('musicSelectBtn');
        const musicUrl = selectBtn.dataset.value || '';
        const selectedMusic = musicList.find(function(m) { return m.value === musicUrl; });
        const musicTitle = selectedMusic ? selectedMusic.label : '';

        createPost(selectedImagesData, description, musicUrl, musicTitle);
        resetMusicPreview();
        stopAllMusic();
      });

      updateImageGrid();
    }

    // ============================================================
    function createProfileView(uid, userData, isOwnProfile = false) {
      const container = document.createElement('div');
      container.className = 'profile-view active';
      container.id = 'profileView';
      container.dataset.uid = uid;

      let avatarContent = '';
      if (userData.avatar) {
        avatarContent = `<img src="${userData.avatar}" alt="Avatar" />`;
      } else {
        avatarContent = `<i class="fas fa-user-circle"></i>`;
      }

      let totalLikes = 0;
      const userPosts = posts.filter(p => p.authorUid === uid);
      userPosts.forEach(post => {
        totalLikes += (post.likes || 0);
      });

      const followersCount = userData.followers ? Object.keys(userData.followers).length : 0;
      const followingCount = userData.following ? Object.keys(userData.following).length : 0;

      let actionsHtml = '';
      if (isOwnProfile) {
        actionsHtml = `
          <div class="profile-actions">
            <button class="edit-profile-btn" id="editProfileBtn"><i class="fas fa-pen"></i> Editar perfil</button>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
          </div>
        `;
      } else {
        const isFollowing = userData.followers && userData.followers[currentUserId] === true;
        const followBtnClass = isFollowing ? 'following' : '';
        const followBtnText = isFollowing ? 'Siguiendo' : 'Seguir';
        actionsHtml = `
          <div class="profile-actions">
            <button class="follow-btn ${followBtnClass}" id="followBtn">${followBtnText}</button>
          </div>
        `;
      }

      container.innerHTML = `
        <div class="profile-header">
          <div class="profile-avatar">${avatarContent}</div>
          <div class="profile-name-row">
            <div class="profile-name" id="profileNameDisplay">${userData.name || 'Usuario'}</div>
            ${userData.verifiedSticker && totalLikes >= 100 ? `
              <span class="verified-sticker-badge" title="Sticker verificado">
                <img src="${userData.verifiedSticker}" alt="Sticker verificado" />
              </span>
            ` : ''}
          </div>
          <div class="profile-bio" id="profileBioDisplay">${userData.bio || ''}</div>
          <div class="profile-stats">
            <div><div class="number">${totalLikes}</div><div class="label">Me gustas</div></div>
            <div><div class="number" id="followersCount">${followersCount}</div><div class="label">Seguidores</div></div>
            <div><div class="number">${followingCount}</div><div class="label">Siguiendo</div></div>
          </div>
          ${actionsHtml}
        </div>
        <div class="profile-posts">
          <h4><i class="fas fa-th"></i> ${isOwnProfile ? 'Mis publicaciones' : 'Publicaciones'}</h4>
          <div class="post-grid" id="profilePostGrid">
            ${userPosts.length === 0 ? '<p style="color:#888; text-align:center; grid-column:1/-1;">No hay publicaciones aún</p>' : ''}
            ${userPosts.slice().reverse().map(post => {
              let imgUrl = '';
              if (post.images && post.images.length > 0) imgUrl = post.images[0];
              else if (post.imageUrl) imgUrl = post.imageUrl;
              return `<div class="post-item" data-post-id="${post.id}" style="background-image:url(${imgUrl}); background-size:cover; background-position:center;">
                ${imgUrl ? '' : '<i class="fas fa-image"></i>'}
                ${isOwnProfile ? `<button class="delete-post-btn" data-post-id="${post.id}"><i class="fas fa-trash"></i></button>` : ''}
              </div>`;
            }).join('')}
          </div>
        </div>
      `;

      // Eventos para los items del grid
      container.querySelectorAll('.post-item').forEach(item => {
        // Al hacer clic en la imagen (no en el botón de eliminar)
        item.addEventListener('click', function(e) {
          if (e.target.closest('.delete-post-btn')) return;
          const postId = this.dataset.postId;
          if (postId) {
            goToPost(postId);
          }
        });

        const deleteBtn = item.querySelector('.delete-post-btn');
        if (deleteBtn) {
          deleteBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const postId = this.dataset.postId;
            if (postId) {
              showDeleteConfirm(postId);
            }
          });
        }
      });

      if (isOwnProfile) {
        container.querySelector('#editProfileBtn').addEventListener('click', showEditProfile);
        container.querySelector('#logoutBtn').addEventListener('click', logout);
      } else {
        const followBtn = container.querySelector('#followBtn');
        const followersSpan = container.querySelector('#followersCount');

        followBtn.addEventListener('click', function() {
          const currentlyFollowing = this.classList.contains('following');
          const targetUid = uid;
          const action = currentlyFollowing ? unfollowUser(targetUid) : followUser(targetUid);

          action.then(() => {
            if (currentlyFollowing) {
              delete userData.followers[currentUserId];
            } else {
              userData.followers[currentUserId] = true;
            }
            const newCount = Object.keys(userData.followers).length;
            if (followersSpan) followersSpan.textContent = newCount;
            this.classList.toggle('following');
            this.textContent = currentlyFollowing ? 'Seguir' : 'Siguiendo';
          }).catch(err => {
            console.warn('Error al seguir/dejar de seguir:', err);
          });
        });
      }

      return container;
    }
