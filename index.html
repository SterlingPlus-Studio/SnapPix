<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SnapPix</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    /* ===== ESTILOS GLOBALES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      font-family: 'CustomFont', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    *:focus {
      outline: none !important;
      box-shadow: none !important;
    }
    button:focus, input:focus, textarea:focus, select:focus {
      outline: none !important;
      box-shadow: none !important;
    }
    @font-face {
      font-family: 'CustomFont';
      src: url('https://raw.githubusercontent.com/SterlingPlus-Studio/clyraplay.xyz/main/Fuente/fuente.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      padding-top: 70px;
      padding-bottom: 80px;
      transition: padding-top 0.2s;
    }
    body.top-bar-hidden {
      padding-top: 0;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #000;
      padding: 16px 20px 12px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      height: 70px;
    }
    .top-bar.hidden { display: none; }
    .top-bar .app-title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: default;
    }
    .top-bar .app-title span {
      background: linear-gradient(145deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .top-bar .right-icons {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .top-bar .right-icons .icon-btn {
      color: #ccc;
      font-size: 22px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px;
      transition: 0.2s;
      position: relative;
    }
    .top-bar .right-icons .icon-btn:hover { color: #fff; }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      height: 100%;
      position: relative;
    }
    .feed-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
      background: #000;
    }

    /* ===== POST CARD ===== */
    .post-card {
      position: relative;
      width: 100%;
      height: calc(100dvh - 70px - 80px);
      min-height: 500px;
      background-color: #000;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      border-radius: 0;
      border: none;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      flex-shrink: 0;
      scroll-margin: 0;
    }
    body.top-bar-hidden .post-card {
      height: calc(100dvh - 80px);
    }
    .post-image-carousel {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      background: #000;
      z-index: 1;
      cursor: pointer;
    }
    .post-image-carousel::-webkit-scrollbar { display: none; }
    .carousel-slide {
      flex: 0 0 100%;
      height: 100%;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background-color: #000;
      pointer-events: none;
    }
    .post-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }
    .post-bottom-left {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 80px;
      z-index: 3;
      color: #fff;
      pointer-events: none;
      max-width: 70%;
    }
    .post-description {
      font-size: 16px;
      line-height: 1.5;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      pointer-events: auto;
      word-wrap: break-word;
      max-height: 40vh;
      overflow-y: auto;
      color: #fff;
    }
    .post-description .hashtag { color: #60a5fa; font-weight: 500; }
    .post-actions-right {
      position: absolute;
      right: 12px;
      bottom: 100px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      pointer-events: none;
    }
    .post-actions-right .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      pointer-events: auto;
      transition: 0.2s;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    .post-actions-right .action-btn i { font-size: 28px; transition: 0.2s; }
    .post-actions-right .action-btn span { font-weight: 500; font-size: 12px; }
    .post-actions-right .action-btn.liked { color: #ef4444; }
    .post-actions-right .action-btn.liked i { transform: scale(1.1); }
    .post-actions-right .action-btn:hover { transform: scale(1.05); }
    .post-actions-right .action-btn:active { transform: scale(0.9); }
    .post-profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8);
      overflow: hidden;
      background: #3b82f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      pointer-events: auto;
      cursor: pointer;
      margin-bottom: 4px;
      flex-shrink: 0;
      transition: transform 0.2s;
      text-transform: uppercase;
      user-select: none;
    }
    .post-profile-avatar:hover { transform: scale(1.05); }
    .post-profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ===== IMAGE COUNTER ===== */
    .image-counter {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 20;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    /* ===== EMPTY FEED & LOADING ===== */
    .empty-feed {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 16px;
      background: #000;
      height: calc(100dvh - 70px - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .empty-feed i { font-size: 48px; margin-bottom: 16px; display: block; color: #444; }
    .empty-feed p { color: #888; }

    .loading-feed {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      background: #000;
      height: calc(100dvh - 70px - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .loading-feed i { font-size: 48px; margin-bottom: 16px; display: block; color: #3b82f6; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== SEARCH ===== */
    .search-view {
      flex: 1;
      width: 100%;
      background: #000;
      padding: 16px 20px;
      overflow-y: auto;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .search-view.active { display: block; }
    .search-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }
    .search-header .back-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #ccc;
      cursor: pointer;
      padding: 4px;
    }
    .search-header .back-btn:hover { color: #fff; }
    .search-header input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #333;
      border-radius: 30px;
      font-size: 16px;
      background: #1a1a1a;
      color: #fff;
      transition: 0.2s;
    }
    .search-header input:focus { border-color: #3b82f6; background: #222; }
    .search-header input::placeholder { color: #777; }
    .search-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 4px;
    }
    .search-tab {
      flex: 1;
      background: none;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      color: #aaa;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
    }
    .search-tab.active { background: #2a2a2a; color: #fff; }
    .search-tab:hover:not(.active) { color: #fff; }
    .search-results {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 20px;
    }
    .search-result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #1a1a1a;
      border-radius: 16px;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: 0.2s;
      color: #eee;
    }
    .search-result-item:hover { background: #2a2a2a; transform: scale(1.01); }
    .search-result-item img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: cover;
      background: #333;
    }
    .search-result-item .info { flex: 1; }
    .search-result-item .info .desc { font-size: 14px; color: #eee; font-weight: 500; }
    .search-result-item .info .tags { font-size: 12px; color: #999; margin-top: 2px; }
    .search-empty {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }
    .search-empty i { font-size: 48px; display: block; margin-bottom: 12px; color: #444; }

    /* ===== COMMENTS ===== */
    .comments-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: flex-end;
      flex-direction: column;
      height: 100%;
      animation: fadeInOverlay 0.25s ease;
    }
    .comments-overlay.active { display: flex; }
    @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
    .comments-panel {
      background: #1a1a1a;
      border-radius: 24px 24px 0 0;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
      padding: 20px 20px 16px 20px;
      animation: slideUp 0.3s ease;
      color: #eee;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .comments-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }
    .comments-panel .panel-header h3 { font-size: 18px; color: #fff; }
    .comments-panel .panel-header .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #999;
      cursor: pointer;
      padding: 4px;
    }
    .comments-panel .panel-header .close-btn:hover { color: #fff; }
    .comments-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      max-height: 50vh;
    }
    .comment-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .comment-item .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #3b82f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
      font-weight: 600;
      text-transform: uppercase;
    }
    .comment-item .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-item .body { flex: 1; }
    .comment-item .body .author { font-weight: 600; font-size: 14px; color: #ddd; }
    .comment-item .body .text { font-size: 14px; color: #ccc; margin-top: 2px; word-wrap: break-word; }
    .comment-item .body .time { font-size: 11px; color: #777; margin-top: 2px; }
    .comments-input-area {
      display: flex;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid #333;
      margin-top: 4px;
    }
    .comments-input-area input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #333;
      border-radius: 30px;
      font-size: 14px;
      background: #111;
      color: #eee;
      transition: 0.2s;
    }
    .comments-input-area input:focus { border-color: #3b82f6; background: #1a1a1a; }
    .comments-input-area input::placeholder { color: #777; }
    .comments-input-area .send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .comments-input-area .send-btn:hover { background: #1d4ed8; transform: scale(1.05); }
    .no-comments { text-align: center; color: #888; padding: 30px 0; font-size: 14px; }

    /* ===== MUSIC PICKER (similar a comments) ===== */
    .music-picker-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2001;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: flex-end;
      flex-direction: column;
      height: 100%;
      animation: fadeInOverlay 0.25s ease;
    }
    .music-picker-overlay.active { display: flex; }
    .music-picker-panel {
      background: #1a1a1a;
      border-radius: 24px 24px 0 0;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      padding: 20px 20px 16px 20px;
      animation: slideUp 0.3s ease;
      color: #eee;
    }
    .music-picker-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }
    .music-picker-panel .panel-header h3 {
      font-size: 18px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .music-picker-panel .panel-header .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      color: #999;
      cursor: pointer;
      padding: 4px;
    }
    .music-picker-panel .panel-header .close-btn:hover { color: #fff; }
    .music-picker-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      max-height: 50vh;
    }
    .music-picker-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
      transition: 0.2s;
      border-radius: 12px;
    }
    .music-picker-item:hover { background: #2a2a2a; }
    .music-picker-item .cover {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #aaa;
      flex-shrink: 0;
      overflow: hidden;
    }
    .music-picker-item .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .music-picker-item .info {
      flex: 1;
    }
    .music-picker-item .info .title {
      font-size: 15px;
      color: #eee;
    }
    .music-picker-item .info .sub {
      font-size: 12px;
      color: #888;
    }
    .music-picker-item .check {
      color: #2563eb;
      font-size: 18px;
      width: 24px;
      text-align: center;
    }
    .music-picker-item .check.hidden { visibility: hidden; }
    .music-picker-item .music-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: auto;
    }
    .music-picker-item .preview-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #2d3748;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .music-picker-item .preview-btn:hover {
      background: #3b82f6;
      transform: scale(1.05);
    }
    .music-picker-item .preview-btn.playing {
      background: #ef4444;
    }
    .music-picker-item .preview-btn.playing:hover {
      background: #dc2626;
    }
    .music-picker-item .preview-btn i {
      font-size: 13px;
      margin-left: 1px;
    }


    /* ===== DIALOGO DE DESCARGA (carrusel horizontal) ===== */
    .download-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(6px);
    }
    .download-overlay.active { display: flex; }
    .download-panel {
      background: #1a1a1a;
      border-radius: 24px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      padding: 24px 20px 20px;
      color: #eee;
      overflow: hidden;
      animation: slideUp 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .download-panel h3 {
      font-size: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .download-panel .image-scroll {
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 12px;
      padding: 8px 4px 16px 4px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      min-height: 150px;
      max-height: 55vh;
    }
    .download-panel .image-scroll::-webkit-scrollbar {
      height: 4px;
    }
    .download-panel .image-scroll::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }
    .download-panel .image-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .download-panel .image-item {
      flex: 0 0 180px;
      scroll-snap-align: start;
      background: #2a2a2a;
      border-radius: 16px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
      border: 2px solid transparent;
    }
    .download-panel .image-item:hover { background: #333; }
    .download-panel .image-item.selected {
      border-color: #2563eb;
      background: #1e2a3a;
    }
    .download-panel .image-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #2563eb;
      cursor: pointer;
      flex-shrink: 0;
      order: 2;
    }
    .download-panel .image-item .thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      background-color: #111;
      flex-shrink: 0;
      order: 1;
    }
    .download-panel .image-item .label {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      order: 3;
    }
    .download-panel .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 16px;
      flex-shrink: 0;
      padding-top: 12px;
      border-top: 1px solid #333;
    }
    .download-panel .actions button {
      padding: 10px 24px;
      border: none;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .download-panel .actions .btn-download {
      background: #2563eb;
      color: #fff;
    }
    .download-panel .actions .btn-download:hover { background: #1d4ed8; transform: scale(1.02); }
    .download-panel .actions .btn-cancel {
      background: #333;
      color: #eee;
    }
    .download-panel .actions .btn-cancel:hover { background: #444; }

    /* ===== LOGIN / REGISTER ===== */
    .login-view {
      flex: 1;
      width: 100%;
      background: #000;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
      color: #eee;
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function buildRandomOrder(ids) {
      return shuffleArray([...ids]);
    }

    function insertNewPostInOrder(newPostId) {
      const pos = Math.floor(Math.random() * (postOrder.length + 1));
      postOrder.splice(pos, 0, newPostId);
    }

    // ============================================================
    //  FIREBASE POSTS
    // ============================================================
    function loadPostsFromFirebase() {
      const postsRef = database.ref('posts');
      postsRef.off();
      postsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          const postsArray = Object.keys(data).map(key => ({
            id: key,
            ...data[key]
          }));
          posts = postsArray;
        } else {
          posts = [];
        }

        if (profileData.likedPosts && profileData.likedPosts.length > 0) {
          posts.forEach(post => {
            post.liked = profileData.likedPosts.includes(post.id);
          });
        } else {
          posts.forEach(post => post.liked = false);
        }

        const currentIds = posts.map(p => p.id);
        if (postOrder.length === 0) {
          postOrder = buildRandomOrder(currentIds);
        } else {
          postOrder = postOrder.filter(id => currentIds.includes(id));
          const newIds = currentIds.filter(id => !postOrder.includes(id));
          newIds.forEach(id => insertNewPostInOrder(id));
        }

        posts.sort((a, b) => {
          const indexA = postOrder.indexOf(a.id);
          const indexB = postOrder.indexOf(b.id);
          return indexA - indexB;
        });

        isPostsLoading = false;

        // Si el feed está visible, actualizarlo
        if (document.getElementById('feedContainer')) {
          updateFeedContainer();
        }
        // Actualizar perfil si está visible
        const profileView = document.getElementById('profileView');
        if (profileView) {
          const viewedUid = profileView.dataset.uid;
          if (viewedUid === currentUserId) {
            showProfile(currentUserId);
          }
        }
      });
    }

    function showDownloadDialog(postId) {
      const post = posts.find(p => p.id === postId);
      if (!post) return;

      let images = [];
      if (post.images && Array.isArray(post.images) && post.images.length > 0) {
        images = post.images;
      } else if (post.imageUrl) {
        images = [post.imageUrl];
      } else {
        return;
      }

      downloadImageScroll.innerHTML = '';
      images.forEach((url, index) => {
        const item = document.createElement('div');
        item.className = 'image-item selected';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = true;
        checkbox.dataset.index = index;
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.style.backgroundImage = `url('${url}')`;
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = `#${index + 1}`;
        item.appendChild(checkbox);
        item.appendChild(thumb);
        item.appendChild(label);
        item.addEventListener('click', function(e) {
          if (e.target.tagName !== 'INPUT') {
            const cb = this.querySelector('input[type="checkbox"]');
            cb.checked = !cb.checked;
            this.classList.toggle('selected', cb.checked);
          } else {
            this.classList.toggle('selected', e.target.checked);
          }
        });
        checkbox.addEventListener('change', function(e) {
          item.classList.toggle('selected', this.checked);
        });
        downloadImageScroll.appendChild(item);
      });

      downloadOverlay.classList.add('active');
      downloadConfirmBtn.dataset.postId = postId;
      downloadImageScroll.scrollLeft = 0;
    }

    function closeDownloadDialog() {
      downloadOverlay.classList.remove('active');
    }

    async function downloadSelectedImages() {
      const items = downloadImageScroll.querySelectorAll('.image-item');
      const selected = [];
      items.forEach(item => {
        const cb = item.querySelector('input[type="checkbox"]');
        if (cb && cb.checked) {
          const idx = parseInt(cb.dataset.index, 10);
          selected.push(idx);
        }
      });

      if (selected.length === 0) {
        alert('No has seleccionado ninguna imagen.');
        return;
      }

      const postId = downloadConfirmBtn.dataset.postId;
      const post = posts.find(p => p.id === postId);
      if (!post) return;

      let images = [];
      if (post.images && Array.isArray(post.images) && post.images.length > 0) {
        images = post.images;
      } else if (post.imageUrl) {
        images = [post.imageUrl];
      }

      const urlsToDownload = selected.map(idx => images[idx]).filter(Boolean);
      if (urlsToDownload.length === 0) {
        alert('No se seleccionaron imágenes válidas.');
        return;
      }

      for (let i = 0; i < urlsToDownload.length; i++) {
        const url = urlsToDownload[i];
        try {
          const response = await fetch(url);
          const blob = await response.blob();
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          const ext = blob.type.split('/')[1] || 'jpg';
          link.download = `imagen_${i+1}.${ext}`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          await new Promise(r => setTimeout(r, 100));
        } catch (err) {
          console.warn('Error al descargar imagen:', err);
          alert(`Error al descargar la imagen ${i+1}.`);
        }
      }

      closeDownloadDialog();
    }

    // ============================================================
    //  CREAR POST CARD
    // ============================================================
    function createPostCard(post) {
      const postCard = document.createElement('div');
      postCard.className = 'post-card';
      postCard.dataset.postId = post.id;

      let images = [];
      if (post.images && Array.isArray(post.images) && post.images.length > 0) {
        images = post.images;
      } else if (post.imageUrl) {
        images = [post.imageUrl];
      }

      const carousel = document.createElement('div');
      carousel.className = 'post-image-carousel';

      if (images.length === 0) {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.style.background = '#111';
        slide.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#555;font-size:48px;"><i class="fas fa-image"></i></div>';
        carousel.appendChild(slide);
      } else {
        images.forEach(url => {
          const slide = document.createElement('div');
          slide.className = 'carousel-slide';
          slide.style.backgroundImage = `url('${url}')`;
          carousel.appendChild(slide);
        });
      }
      postCard.appendChild(carousel);

      carousel.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleMusicPlayback();
      });

      let pressTimer = null;
      const startPress = function(e) {
        pressTimer = setTimeout(() => {
          const postId = this.closest('.post-card').dataset.postId;
          showDownloadDialog(postId);
        }, 500);
      };
      const endPress = function(e) {
        clearTimeout(pressTimer);
      };
      const cancelPress = function(e) {
        clearTimeout(pressTimer);
      };
      carousel.addEventListener('touchstart', startPress, { passive: true });
      carousel.addEventListener('touchend', endPress, { passive: true });
      carousel.addEventListener('touchcancel', cancelPress, { passive: true });
      carousel.addEventListener('mousedown', function(e) {
        if (e.button === 0) {
          startPress.call(this, e);
        }
      });
      carousel.addEventListener('mouseup', function(e) {
        if (e.button === 0) {
          endPress.call(this, e);
        }
      });
      carousel.addEventListener('mouseleave', function(e) {
        cancelPress.call(this, e);
      });

      if (images.length > 1) {
        const counter = document.createElement('div');
        counter.className = 'image-counter';
        counter.textContent = `1/${images.length}`;
        counter.dataset.total = images.length;
        postCard.appendChild(counter);
        carousel.addEventListener('scroll', function() {
          const total = parseInt(counter.dataset.total, 10);
          const slideWidth = this.querySelector('.carousel-slide')?.offsetWidth || 1;
          const scrollLeft = this.scrollLeft;
          const index = Math.round(scrollLeft / slideWidth) + 1;
          counter.textContent = `${Math.min(index, total)}/${total}`;
        });
      }

      const authorUid = post.authorUid || post.authorId || 'unknown';
      const authorName = post.authorName || 'Usuario';
      let authorAvatar = post.authorAvatar || null;

      let displayAvatar = authorAvatar;
      if (authorUid === currentUserId && profileData.avatar) {
        displayAvatar = profileData.avatar;
      }

      let avatarContent = '';
      if (displayAvatar) {
        avatarContent = `<img src="${displayAvatar}" alt="Avatar" />`;
      } else {
        const initials = authorName.split(' ').map(word => word[0]).join('').toUpperCase().slice(0, 2);
        const hue = Math.abs(authorName.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0) * 137) % 360;
        avatarContent = `<span style="background:hsl(${hue}, 70%, 50%); display:flex; align-items:center; justify-content:center; width:100%; height:100%; border-radius:50%; font-size:20px; font-weight:600; color:white;">${initials || '?'}</span>`;
      }

      const likedClass = post.liked ? 'liked' : '';
      const commentCount = post.comments ? post.comments.length : 0;

      let descHtml = post.description || 'Sin descripción';
      descHtml = descHtml.replace(/#(\w+)/g, '<span class="hashtag">#$1</span>');

      const bottomLeft = document.createElement('div');
      bottomLeft.className = 'post-bottom-left';
      bottomLeft.innerHTML = `<div class="post-description">${descHtml}</div>`;

      const actionsRight = document.createElement('div');
      actionsRight.className = 'post-actions-right';
      actionsRight.innerHTML = `
        <div class="post-profile-avatar" data-author-uid="${authorUid}">${avatarContent}</div>
        <button class="action-btn like-btn ${likedClass}" data-post-id="${post.id}">
          <i class="fas fa-heart"></i>
          <span class="like-count">${post.likes || 0}</span>
        </button>
        <button class="action-btn comment-btn" data-post-id="${post.id}">
          <i class="fas fa-comment"></i>
          <span class="comment-count">${commentCount}</span>
        </button>
      `;

      postCard.appendChild(bottomLeft);
      postCard.appendChild(actionsRight);

      const avatarDiv = postCard.querySelector('.post-profile-avatar');
      if (avatarDiv) {
        avatarDiv.addEventListener('click', function(e) {
          e.stopPropagation();
          const uid = this.dataset.authorUid;
          if (uid && uid !== 'unknown') {
            showUserProfile(uid);
          } else {
            showProfile(currentUserId);
          }
        });
      }
      const likeBtn = postCard.querySelector('.like-btn');
      if (likeBtn) {
        likeBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          const postId = this.dataset.postId;
          toggleLike(postId);
        });
      }
      const commentBtn = postCard.querySelector('.comment-btn');
      if (commentBtn) {
        commentBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          const postId = this.dataset.postId;
          openComments(postId);
        });
      }

      return postCard;
    }

    // ============================================================
    //  IMGBB
    // ============================================================
    function uploadImageToImgbb(imageDataUrl) {
      return new Promise((resolve, reject) => {
        fetch(imageDataUrl)
          .then(res => res.blob())
          .then(blob => {
            const formData = new FormData();
            formData.append('key', IMGBB_API_KEY);
            formData.append('image', blob, 'image.jpg');
            fetch(IMGBB_UPLOAD_URL, {
              method: 'POST',
              body: formData
            })
            .then(response => response.json())
            .then(data => {
              if (data.success) {
                resolve(data.data.url);
              } else {
                reject(new Error('Error en ImgBB: ' + (data.error?.message || 'Desconocido')));
              }
            })
            .catch(reject);
          })
          .catch(reject);
      });
    }

    function uploadMultipleImages(imagesData) {
      return new Promise((resolve, reject) => {
        let urls = [];
        let completed = 0;
        if (imagesData.length === 0) {
          resolve([]);
          return;
        }
        imagesData.forEach((imgData, index) => {
          uploadImageToImgbb(imgData)
            .then(url => {
              urls.push(url);
              completed++;
              const loadingMsg = document.querySelector('.upload-progress-msg');
              if (loadingMsg) {
                loadingMsg.textContent = `Subiendo imagen ${completed} de ${imagesData.length}...`;
              }
              if (completed === imagesData.length) {
                resolve(urls);
              }
            })
            .catch(err => {
              reject(err);
            });
        });
      });
    }

    async function loadMusicFromJson() {
      try {
        const response = await fetch(MUSIC_JSON_URL);
        if (!response.ok) throw new Error('Error al cargar la música');
        const data = await response.json();
        if (Array.isArray(data) && data.length > 0) {
          musicList = data.map(item => ({
            value: item.file,
            label: item.title || 'Sin título',
            icon: item.icon || item.iconUrl || item.image || item.cover || item.thumbnail || ''
          }));
        } else {
          throw new Error('Formato de datos inválido');
        }
      } catch (error) {
        console.warn('Error al cargar música desde GitHub, usando lista por defecto:', error);
        musicList = [

    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
      }
      const hue = Math.abs(hash) % 360;
      return `hsl(${hue}, 70%, 50%)`;
    }

    function getMusicIconCandidates(item) {
      const candidates = [];
      const add = (value) => {
        if (value && !candidates.includes(value)) candidates.push(value);
      };

      add(item && item.icon);
      add(item && item.iconUrl);
      add(item && item.image);
      add(item && item.cover);
      add(item && item.thumbnail);

      const fileName = (item && item.file ? String(item.file) : '').split('/').pop().split('?')[0];
      if (fileName) {
        const base = fileName.replace(/\.[^.]+$/, '');
        const encodedBase = encodeURIComponent(base);
        const rawRoot = 'https://raw.githubusercontent.com/SterlingPlus-Studio/Musica/main/Icono/';
        ['png', 'jpg', 'jpeg', 'webp'].forEach(ext => add(`${rawRoot}${encodedBase}.${ext}`));
        ['png', 'jpg', 'jpeg', 'webp'].forEach(ext => add(`Icono/${encodedBase}.${ext}`));
      }

      return candidates;
    }


    function resetMusicPreview() {
      if (musicPreviewButton) {
        musicPreviewButton.classList.remove('playing');
        musicPreviewButton.innerHTML = '<i class="fas fa-play"></i>';
      }
      musicPreviewButton = null;
      musicPreviewUrl = '';
      musicPickerPreviewAudio.pause();
      musicPickerPreviewAudio.currentTime = 0;
      musicPickerPreviewAudio.src = '';
    }

    function toggleMusicPreview(item, button, event) {
      if (event) event.stopPropagation();
      if (!item || !item.value) return;

      if (musicPreviewUrl === item.value && !musicPickerPreviewAudio.paused) {
        resetMusicPreview();
        return;
      }

      if (musicPreviewButton && musicPreviewButton !== button) {
        musicPreviewButton.classList.remove('playing');
        musicPreviewButton.innerHTML = '<i class="fas fa-play"></i>';
      }

      musicPreviewButton = button;
      musicPreviewUrl = item.value;

      musicPickerPreviewAudio.pause();
      musicPickerPreviewAudio.src = item.value;
      musicPickerPreviewAudio.currentTime = 0;

      const playPromise = musicPickerPreviewAudio.play();
      if (playPromise && typeof playPromise.then === 'function') {
        playPromise.then(function() {
          if (musicPreviewButton === button) {
            button.classList.add('playing');
            button.innerHTML = '<i class="fas fa-pause"></i>';
          }
        }).catch(function(err) {
          console.warn('No se pudo reproducir la vista previa:', err);
          if (musicPreviewButton === button) {
            button.classList.remove('playing');
            button.innerHTML = '<i class="fas fa-play"></i>';
          }
        });
      } else {
        button.classList.add('playing');
        button.innerHTML = '<i class="fas fa-pause"></i>';
      }

      musicPickerPreviewAudio.onended = function() {
        if (musicPreviewButton === button) {
          button.classList.remove('playing');
          button.innerHTML = '<i class="fas fa-play"></i>';
          musicPreviewButton = null;
          musicPreviewUrl = '';
        }
      };
    }

    function renderMusicCover(coverEl, item, fallbackHtml) {
      if (!coverEl) return;

      const label = item && item.label ? item.label : 'Sin música';
      const color = label !== 'Sin música' ? stringToColor(label) : '#444';
      const candidates = getMusicIconCandidates(item);

      coverEl.style.background = color;

      if (!candidates.length) {
        coverEl.innerHTML = fallbackHtml;
        return;
      }

      const img = document.createElement('img');
      let index = 0;

      const tryNext = () => {
        if (index >= candidates.length) {
          coverEl.innerHTML = fallbackHtml;
          coverEl.style.background = color;
          return;
        }
        img.src = candidates[index++];
      };

      img.onerror = tryNext;
      img.onload = () => {
        coverEl.innerHTML = '';
        coverEl.appendChild(img);
      };

      tryNext();
    }

    // ============================================================
    function playFeedMusic(postId, url) {
      if (!url) return;
      if (globalAudio.src === url && !globalAudio.paused) return;
      stopAllMusic();
      if (globalAudio.src !== url) {
        globalAudio.src = url;
        globalAudio.load();
      } else {
        globalAudio.currentTime = 0;
      }

      const playFn = () => {
        globalAudio.play().then(() => {
          currentFeedAudioPostId = postId;
          isPlaying = true;
        }).catch(err => {
          console.warn('Error al reproducir en feed:', err);
          currentFeedAudioPostId = null;
          isPlaying = false;
        });
      };

      if (globalAudio.readyState >= 2) {
        playFn();
      } else {
        globalAudio.addEventListener('canplaythrough', playFn, { once: true });
        setTimeout(() => {
          if (currentFeedAudioPostId !== postId) {
            globalAudio.removeEventListener('canplaythrough', playFn);
            playFn();
          }
        }, 3000);
      }
    }

    function tryAutoPlayFirstMusic() {
      if (autoPlayAttempted) return;
      if (posts.length === 0) return;
      const firstWithMusic = posts.find(p => p.musicUrl);
      if (firstWithMusic) {
        autoPlayAttempted = true;
        playFeedMusic(firstWithMusic.id, firstWithMusic.musicUrl);
        const playOnInteraction = function() {
          if (!isPlaying && globalAudio.src) {
            globalAudio.play().then(() => {
              isPlaying = true;
              if (firstWithMusic) currentFeedAudioPostId = firstWithMusic.id;
            }).catch(() => {});
          }
          document.removeEventListener('click', playOnInteraction);
          document.removeEventListener('touchstart', playOnInteraction);
        };
        document.addEventListener('click', playOnInteraction, { once: true });
        document.addEventListener('touchstart', playOnInteraction, { once: true });
      }
    }

    function setupFeedAutoPlay() {
      if (feedObserver) {
        feedObserver.disconnect();
        feedObserver = null;
      }
      const container = document.getElementById('feedContainer');
      if (!container) return;
      feedObserver = new IntersectionObserver((entries) => {
        let mostVisiblePost = null;
        let maxRatio = 0;
        entries.forEach(entry => {
          if (entry.isIntersecting && entry.intersectionRatio > maxRatio) {
            maxRatio = entry.intersectionRatio;
            mostVisiblePost = entry.target;
          }
        });
        if (mostVisiblePost) {
          const postId = mostVisiblePost.dataset.postId;
          const post = posts.find(p => p.id === postId);
          if (post && post.musicUrl) {
            if (currentFeedAudioPostId !== postId) {
              playFeedMusic(postId, post.musicUrl);
            }
          } else {
            const visibleCards = container.querySelectorAll('.post-card');
            let nextWithMusic = null;
            for (let card of visibleCards) {
              const id = card.dataset.postId;
              const p = posts.find(po => po.id === id);
              if (p && p.musicUrl) {
                nextWithMusic = p;
                break;
              }
            }
            if (nextWithMusic && nextWithMusic.id !== currentFeedAudioPostId) {
              playFeedMusic(nextWithMusic.id, nextWithMusic.musicUrl);
            } else if (!nextWithMusic) {
              stopAllMusic();
            }
          }
        } else {
          stopAllMusic();
        }
      }, {
        threshold: [0.3, 0.5, 0.7],
        root: mainContent,
        rootMargin: '0px'
      });
      document.querySelectorAll('.post-card').forEach(card => {
        feedObserver.observe(card);
      });
    }

    function updateLikeInDOM(postId, isLiked, newLikes) {
      const postCard = document.querySelector(`.post-card[data-post-id="${postId}"]`);
      if (!postCard) return;
      const likeBtn = postCard.querySelector('.like-btn');
      const likeCount = postCard.querySelector('.like-count');

        likeBtn.classList.toggle('liked', isLiked);
      }
      if (likeCount) {
        likeCount.textContent = newLikes;
      }
    }

    function toggleLike(postId) {
      const post = posts.find(p => p.id === postId);
      if (!post) return;
      const isLiked = post.liked;
      const newLiked = !isLiked;
      const newLikes = (post.likes || 0) + (newLiked ? 1 : -1);

      post.liked = newLiked;
      post.likes = newLikes;

      let updatedLikedPosts = [...profileData.likedPosts];
      if (newLiked) {
        if (!updatedLikedPosts.includes(postId)) {
          updatedLikedPosts.push(postId);
        }
      } else {
        updatedLikedPosts = updatedLikedPosts.filter(id => id !== postId);
      }
      profileData.likedPosts = updatedLikedPosts;

      updateLikeInDOM(postId, newLiked, newLikes);

      isUpdatingLike = true;

      const updates = { likedPosts: updatedLikedPosts };
      updateUserProfile(auth.currentUser.uid, updates)
        .then(() => {
          return updatePostInFirebase(postId, { likes: newLikes });
        })
        .then(() => {
          isUpdatingLike = false;
        })
        .catch(err => {
          console.warn('Error al actualizar like:', err);
          post.liked = isLiked;
          post.likes = (post.likes || 0) + (newLiked ? -1 : 1);
          profileData.likedPosts = isLiked ? [...profileData.likedPosts, postId] : profileData.likedPosts.filter(id => id !== postId);
          updateLikeInDOM(postId, isLiked, post.likes);
          isUpdatingLike = false;
        });
    }

    function showSearchView() {
      stopAllMusic();

      const container = document.createElement('div');
      container.className = 'search-view active';
      container.id = 'searchView';

      container.innerHTML = `
        <div class="search-header">
          <button class="back-btn" id="searchBackBtn"><i class="fas fa-arrow-left"></i></button>
          <input type="text" id="searchInput" placeholder="Buscar..." autofocus />

      function getRandomSuggestions(type) {
        const results = [];
        if (type === 'posts') {
          const shuffled = shuffleArray([...posts]);
          const sliced = shuffled.slice(0, 10);
          sliced.forEach(post => {
            let imgSrc = '';
            if (post.images && post.images.length > 0) imgSrc = post.images[0];
            else if (post.imageUrl) imgSrc = post.imageUrl;
            results.push({
              id: post.id,
              image: imgSrc,
              desc: post.description || 'Sin descripción',
              music: post.musicTitle || ''
            });
          });
        } else {
          const userSet = new Map();
          posts.forEach(post => {
            if (post.authorUid && post.authorUid !== 'unknown') {
              if (!userSet.has(post.authorUid)) {
                userSet.set(post.authorUid, {
                  uid: post.authorUid,
                  name: post.authorName || 'Usuario',
                  avatar: post.authorAvatar || null,
                  bio: ''
                });
              }
            }
          });
          const usersArray = Array.from(userSet.values());
          const shuffled = shuffleArray(usersArray);
          const sliced = shuffled.slice(0, 10);
          sliced.forEach(user => {
            results.push({
              uid: user.uid,
              name: user.name,
              avatar: user.avatar,
              bio: ''
            });
          });
        }
        return results;
      }

      function renderSearchResults(query) {
        const tab = searchActiveTab;
        const resultsContainer = document.getElementById('searchResults');
        if (!resultsContainer) return;

        if (query.length === 0) {
          const suggestions = getRandomSuggestions(tab);
          if (suggestions.length === 0) {
            resultsContainer.innerHTML = `
              <div class="search-empty">

                <p>No hay sugerencias disponibles</p>

                  <div class="info">

                  </div>
                </div>

            });

            suggestions.forEach(item => {

                : `<div style="width:60px;height:60px;border-radius:12px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;color:#555;font-size:24px;"><i class="fas fa-user"></i></div>`;

                    <div class="desc">${item.name}</div>
                    <div class="tags">${item.bio || ''}</div>

                if (uid) {

                }
              });
            }
          });
          return;
        }

        performSearch(query);
      }

        tab.addEventListener('click', function() {

          searchActiveTab = this.dataset.tab;

    }

    function performSearch(query) {
      const searchResults = document.getElementById('searchResults');
      if (!searchResults) return;
      if (query.length === 0) return;

      if (searchActiveTab === 'posts') {
        const results = posts.filter(post => {
          const desc = post.description.toLowerCase();
          return desc.includes(query.toLowerCase());
        });

        if (results.length === 0) {
          searchResults.innerHTML = `
            <div class="search-empty">
              <i class="fas fa-times-circle"></i>
              <p>No se encontraron publicaciones con "${query}"</p>
            </div>
          `;
          return;
        }

        let html = '';
        results.forEach(post => {
          const preview = post.description.length > 60 ? post.description.substring(0, 60) + '...' : post.description;
          let imgSrc = '';
          if (post.images && post.images.length > 0) imgSrc = post.images[0];
          else if (post.imageUrl) imgSrc = post.imageUrl;

          html += `
            <div class="search-result-item" data-post-id="${post.id}">
              ${imgSrc ? `<img src="${imgSrc}" alt="Preview" />` : `<div style="width:60px;height:60px;border-radius:12px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;color:#555;"><i class="fas fa-image"></i></div>`}
              <div class="info">
                <div class="desc">${preview}</div>
                <div class="tags">${post.musicTitle ? '🎵 ' + post.musicTitle : ''}</div>
              </div>
            </div>
          `;
        });
        searchResults.innerHTML = html;

        searchResults.querySelectorAll('.search-result-item').forEach(item => {
          item.addEventListener('click', function() {
            const postId = this.dataset.postId;
            closeSearchAndGoToPost(postId);
          });
        });
      } else {
        searchUsers(query).then(users => {
          if (users.length === 0) {
            searchResults.innerHTML = `
              <div class="search-empty">
                <i class="fas fa-users-slash"></i>
                <p>No se encontraron usuarios con "${query}"</p>
              </div>
            `;
            return;
          }

          let html = '';
          users.forEach(user => {
            const avatarHtml = user.avatar
              ? `<img src="${user.avatar}" alt="Avatar" />`
              : `<div style="width:60px;height:60px;border-radius:12px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;color:#555;font-size:24px;"><i class="fas fa-user"></i></div>`;
            html += `
              <div class="search-result-item" data-uid="${user.uid}">
                ${avatarHtml}
                <div class="info">
                  <div class="desc">${user.name}</div>
                  <div class="tags">${user.bio || ''}</div>
                </div>
              </div>
            `;
          });
          searchResults.innerHTML = html;

          searchResults.querySelectorAll('.search-result-item').forEach(item => {
            item.addEventListener('click', function() {
              const uid = this.dataset.uid;
              if (uid) {
                closeSearch();
                showUserProfile(uid);
              }
            });
          });
        }).catch(err => {
          console.warn('Error al buscar usuarios:', err);
          searchResults.innerHTML = `
            <div class="search-empty">
              <i class="fas fa-exclamation-triangle"></i>
              <p>Error al buscar usuarios</p>
            </div>
          `;
        });
      }
    }

    function searchUsers(query) {
      return new Promise((resolve, reject) => {
        if (!query || query.length < 1) {
          resolve([]);
          return;
        }
        const usersRef = database.ref('users');
        const searchTerm = query.toLowerCase();
        usersRef.orderByChild('name').startAt(query).endAt(query + '\uf8ff').once('value')
          .then(snapshot => {
            const data = snapshot.val();
            if (!data) {
              resolve([]);
              return;
            }
            const results = [];
            Object.keys(data).forEach(uid => {
              const user = data[uid];
              if (user.name && user.name.toLowerCase().includes(searchTerm)) {
                results.push({
                  uid: uid,
                  name: user.name || 'Usuario',
                  bio: user.bio || '',
                  avatar: user.avatar || null
                });
              }
            });
            resolve(results);
          })
          .catch(err => reject(err));
      });
    }

    function closeSearch() {
      const searchView = document.getElementById('searchView');
      if (searchView) searchView.remove();
      showHome();
    }

    function closeSearchAndGoToPost(postId) {
      const searchView = document.getElementById('searchView');
      if (searchView) searchView.remove();
      showHome();
      setTimeout(() => {
        const cards = document.querySelectorAll('.post-card');
        let targetCard = null;
        cards.forEach(card => {
          if (card.dataset.postId === postId) {
            targetCard = card;
          }
        });
        if (targetCard) {
          targetCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 300);
    }

    // ============================================================
    //  CREAR POST
    // ============================================================
    function createPost(imagesData, description, musicUrl, musicTitle) {
      const loadingMsg = document.createElement('div');
      loadingMsg.className = 'upload-progress-msg';
      loadingMsg.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);color:white;padding:20px 30px;border-radius:16px;z-index:9999;font-size:16px;text-align:center;';
      loadingMsg.innerHTML = `Subiendo imagen 0 de ${imagesData.length}...`;
      document.body.appendChild(loadingMsg);

      uploadMultipleImages(imagesData)
        .then(imageUrls => {
          loadingMsg.textContent = 'Guardando publicación...';
          const postData = {
            images: imageUrls,
            description: description.trim() || 'Sin descripción',
            musicUrl: musicUrl || '',
            musicTitle: musicTitle || '',
            likes: 0,
            liked: false,
            comments: [],
            timestamp: Date.now(),
            authorName: profileData.name,
            authorUid: auth.currentUser.uid,
            authorAvatar: profileData.avatar || null
          };
          return savePostToFirebase(postData);
        })
        .then(() => {
          loadingMsg.remove();
          showHome();
        })
        .catch(err => {
          loadingMsg.remove();
          alert('Error al publicar: ' + err.message);
          console.error(err);
        });
    }

    // ---- VISTA CREAR POST ----
    function showCreatePost(preloadedImages = []) {
      stopAllMusic();
      closeComments();
      if (preloadedImages.length > 0) {
        selectedImagesData = preloadedImages;
      } else {
        selectedImagesData = [];
      }
      clearMainContent();
      showTopBar(false);

      const container = document.createElement('div');
      container.className = 'create-post-view active';
      container.id = 'createPostView';

      const defaultMusic = musicList[0] || { value: '', label: 'Sin música' };

      container.innerHTML = `
        <div class="create-header">
          <button class="back-btn" id="createBackBtn"><i class="fas fa-arrow-left"></i></button>
          <h2>Nueva publicación</h2>
          <button class="publish-btn" id="createPublishBtn">Publicar</button>
        </div>
        <div class="create-images-grid" id="createImagesGrid">
          <div class="create-images-placeholder">
            <i class="fas fa-images"></i>
            <span>Selecciona imágenes</span>
          </div>
        </div>
        <button class="select-image-btn" id="selectImageBtn"><i class="fas fa-camera"></i> Seleccionar imágenes</button>
        <input type="file" id="createImageInput" accept="image/*" multiple style="display:none;" />
        <div class="create-field">
          <label for="createDescInput">Descripción (usa #etiquetas)</label>
          <textarea id="createDescInput" placeholder="Escribe una descripción..."></textarea>
        </div>
        <div class="create-field">
          <label>Música</label>
          <div class="music-player-wrapper">
            <button class="music-select-btn" id="musicSelectBtn" data-value="${defaultMusic.value}">
              <div class="cover" style="background:#444;"><i class="fas fa-music"></i></div>
              <span class="info">${defaultMusic.label}</span>
              <span class="arrow"><i class="fas fa-chevron-down"></i></span>
            </button>
          </div>
        </div>
      `;

      mainContent.appendChild(container);

      // Inicializar el selector de música
      updateMusicPicker();

      // Evento para abrir el picker
      document.getElementById('musicSelectBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        openMusicPicker();
      });


      // Grid de imágenes
      function updateImageGrid() {
        const grid = document.getElementById('createImagesGrid');
        if (!grid) return;
        grid.innerHTML = '';
        if (selectedImagesData.length === 0) {
          grid.innerHTML = `
            <div class="create-images-placeholder">
              <i class="fas fa-images"></i>
              <span>Selecciona imágenes</span>
            </div>
          `;
          return;
        }
        selectedImagesData.forEach((dataUrl, index) => {
          const item = document.createElement('div');
          item.className = 'create-image-item';
          item.style.backgroundImage = `url('${dataUrl}')`;
          const removeBtn = document.createElement('button');
          removeBtn.className = 'remove-btn';
          removeBtn.innerHTML = '<i class="fas fa-times"></i>';
          removeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            selectedImagesData.splice(index, 1);
            updateImageGrid();
          });
          item.appendChild(removeBtn);
          grid.appendChild(item);
        });
      }

      // SELECCIÓN DE IMÁGENES (corregido)
      const selectImageBtn = document.getElementById('selectImageBtn');
      const createImageInput = document.getElementById('createImageInput');

      function readFileAsDataUrl(file) {
        return new Promise(function(resolve, reject) {
          const reader = new FileReader();
          reader.onload = function(ev) {
            resolve(ev.target.result);
          };
          reader.onerror = function() {
            reject(new Error('No se pudo leer la imagen.'));
          };
          reader.readAsDataURL(file);
        });
      }

      if (selectImageBtn && createImageInput) {
        selectImageBtn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          createImageInput.value = '';
          createImageInput.click();
        });

        createImageInput.addEventListener('change', async function(e) {
          const files = Array.from(e.target.files || []);
          if (!files.length) return;

          try {
            const loadedImages = await Promise.all(files.map(function(file) {
              return readFileAsDataUrl(file);
            }));
            selectedImagesData = selectedImagesData.concat(loadedImages);
            updateImageGrid();
          } catch (err) {
            console.warn('Error al cargar imágenes seleccionadas:', err);
            alert('No se pudieron agregar todas las imágenes seleccionadas.');
          } finally {
            this.value = '';
          }
        });
      } else {
        console.warn('No se encontraron los elementos para seleccionar imágenes');
      }

      container.querySelector('#createBackBtn').addEventListener('click', function() {
        stopAllMusic();
        showHome();
      });

      container.querySelector('#createPublishBtn').addEventListener('click', function() {
        if (selectedImagesData.length === 0) {
          alert('Por favor, selecciona al menos una imagen.');
          return;
        }
        const description = document.getElementById('createDescInput').value.trim() || 'Sin descripción';
        const selectBtn = document.getElementById('musicSelectBtn');
        const musicUrl = selectBtn.dataset.value || '';
        const selectedMusic = musicList.find(m => m.value === musicUrl);
        const musicTitle = selectedMusic ? selectedMusic.label : '';
        createPost(selectedImagesData, description, musicUrl, musicTitle);
        resetMusicPreview();
        stopAllMusic();
      });

      // Cargar la música por defecto
      const defaultUrl = defaultMusic.value;
      if (defaultUrl) {
        globalAudio.src = defaultUrl;
        globalAudio.load();
      }

      updateImageGrid();
    }

    // ============================================================
    //  PERFIL
    // ============================================================
    function createProfileView(uid, userData, isOwnProfile = false) {
      const container = document.createElement('div');
      container.className = 'profile-view active';
      container.id = 'profileView';
      container.dataset.uid = uid;

      let avatarContent = '';
      if (userData.avatar) {
        avatarContent = `<img src="${userData.avatar}" alt="Avatar" />`;
      } else {
        avatarContent = `<i class="fas fa-user-circle"></i>`;
      }

      let totalLikes = 0;
      const userPosts = posts.filter(p => p.authorUid === uid);
      userPosts.forEach(post => {
        totalLikes += (post.likes || 0);
      });

      const followersCount = userData.followers ? Object.keys(userData.followers).length : 0;
      const followingCount = userData.following ? Object.keys(userData.following).length : 0;

      let actionsHtml = '';
      if (isOwnProfile) {
        actionsHtml = `
          <div class="profile-actions">
            <button class="edit-profile-btn" id="editProfileBtn"><i class="fas fa-pen"></i> Editar perfil</button>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
          </div>
        `;
      } else {
        const isFollowing = userData.followers && userData.followers[currentUserId] === true;
        const followBtnClass = isFollowing ? 'following' : '';
        const followBtnText = isFollowing ? 'Siguiendo' : 'Seguir';
        actionsHtml = `
          <div class="profile-actions">
            <button class="follow-btn ${followBtnClass}" id="followBtn">${followBtnText}</button>
          </div>
        `;
      }

      container.innerHTML = `
        <div class="profile-header">
          <div class="profile-avatar">${avatarContent}</div>
          <div class="profile-name" id="profileNameDisplay">${userData.name || 'Usuario'}</div>
          <div class="profile-bio" id="profileBioDisplay">${userData.bio || ''}</div>
          <div class="profile-stats">
            <div><div class="number">${totalLikes}</div><div class="label">Me gustas</div></div>
            <div><div class="number" id="followersCount">${followersCount}</div><div class="label">Seguidores</div></div>
            <div><div class="number">${followingCount}</div><div class="label">Siguiendo</div></div>
          </div>
          ${actionsHtml}
        </div>
        <div class="profile-posts">
          <h4><i class="fas fa-th"></i> ${isOwnProfile ? 'Mis publicaciones' : 'Publicaciones'}</h4>
          <div class="post-grid" id="profilePostGrid">
            ${userPosts.length === 0 ? '<p style="color:#888; text-align:center; grid-column:1/-1;">No hay publicaciones aún</p>' : ''}
            ${userPosts.slice().reverse().map(post => {
              let imgUrl = '';
              if (post.images && post.images.length > 0) imgUrl = post.images[0];
              else if (post.imageUrl) imgUrl = post.imageUrl;
              return `<div class="post-item" data-post-id="${post.id}" style="background-image:url(${imgUrl}); background-size:cover; background-position:center;">
                ${imgUrl ? '' : '<i class="fas fa-image"></i>'}
              </div>`;
            }).join('')}
          </div>
        </div>
      `;

      container.querySelectorAll('.post-item').forEach(item => {
        item.addEventListener('click', function() {
          const postId = this.dataset.postId;
          if (postId) {
            goToPost(postId);
          }
        });
      });

      if (isOwnProfile) {
        container.querySelector('#editProfileBtn').addEventListener('click', showEditProfile);
        container.querySelector('#logoutBtn').addEventListener('click', logout);
      } else {
        const followBtn = container.querySelector('#followBtn');
        const followersSpan = container.querySelector('#followersCount');

        followBtn.addEventListener('click', function() {
          const currentlyFollowing = this.classList.contains('following');
          const targetUid = uid;
          const action = currentlyFollowing ? unfollowUser(targetUid) : followUser(targetUid);

          action.then(() => {
            if (currentlyFollowing) {
              delete userData.followers[currentUserId];
            } else {
              userData.followers[currentUserId] = true;
            }
            const newCount = Object.keys(userData.followers).length;
            if (followersSpan) followersSpan.textContent = newCount;
            this.classList.toggle('following');
            this.textContent = currentlyFollowing ? 'Seguir' : 'Siguiendo';
          }).catch(err => {
            console.warn('Error al seguir/dejar de seguir:', err);
          });
        });
      }

      return container;
    }

    // ---- MOSTRAR PERFIL ----
    function showUserProfile(uid) {
      stopAllMusic();
      closeComments();
      clearMainContent();
      showTopBar(false);
      homeBtn.classList.remove('active');
      profileBtn.classList.add('active');

      if (uid === currentUserId) {
        const profileView = createProfileView(uid, profileData, true);
        mainContent.appendChild(profileView);
      } else {
        getUserProfile(uid).then(userData => {
          const profileView = createProfileView(uid, userData, false);
          mainContent.appendChild(profileView);
        }).catch(err => {
          console.warn('Error al cargar perfil de usuario:', err);
          const profileView = createProfileView(uid, { name: 'Usuario', bio: '', avatar: null, followers: {}, following: {} }, false);
          mainContent.appendChild(profileView);
        });
      }
    }

    function showProfile(uid) {
      if (!uid) uid = currentUserId;
      showUserProfile(uid);
    }

    // ---- EDITAR PERFIL ----
    function createEditProfileView() {
      const container = document.createElement('div');
      container.className = 'edit-profile-view active';
      container.id = 'editProfileView';

      let avatarPreviewHtml = '';
      if (profileData.avatar) {
        avatarPreviewHtml = `<img src="${profileData.avatar}" alt="Avatar" id="editAvatarImg" />`;
      } else {
        avatarPreviewHtml = `<i class="fas fa-user-circle placeholder-icon" id="editAvatarPlaceholder"></i>`;
      }

      container.innerHTML = `
        <div class="edit-header">
          <button class="back-btn" id="editBackBtn"><i class="fas fa-arrow-left"></i></button>
          <h2>Editar perfil</h2>
          <button class="save-btn" id="editSaveBtn">Guardar</button>
        </div>
        <div class="edit-avatar-section">
          <div class="avatar-preview" id="editAvatarPreview">${avatarPreviewHtml}</div>
          <div class="avatar-hint">Toca la foto para cambiarla</div>
          <input type="file" id="editAvatarInput" accept="image/*" />
        </div>
        <div class="edit-field">
          <label for="editNameInput">Nombre</label>
          <input type="text" id="editNameInput" value="${profileData.name}" placeholder="Tu nombre" />
        </div>
        <div class="edit-field">
          <label for="editBioInput">Descripción</label>
          <textarea id="editBioInput" placeholder="Cuéntanos sobre ti">${profileData.bio}</textarea>
        </div>
      `;

      container.querySelector('#editBackBtn').addEventListener('click', function() {
        stopAllMusic();
        showProfile(currentUserId);
      });
      container.querySelector('#editSaveBtn').addEventListener('click', saveProfileData);
      const avatarPreview = container.querySelector('#editAvatarPreview');
      const fileInput = container.querySelector('#editAvatarInput');
      avatarPreview.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          const dataUrl = ev.target.result;
          avatarPreview.innerHTML = `<img src="${dataUrl}" alt="Avatar" id="editAvatarImg" />`;
          editAvatarPreview = dataUrl;
          editAvatarFile = file;
        };
        reader.readAsDataURL(file);
      });

      return container;
    }

    function saveProfileData() {
      const editView = document.getElementById('editProfileView');
      if (!editView) return;
      const nameInput = editView.querySelector('#editNameInput');
      const bioInput = editView.querySelector('#editBioInput');
      const newName = nameInput.value.trim() || 'Usuario';
      const newBio = bioInput.value.trim() || '';

      const updates = {
        name: newName,
        bio: newBio
      };

      let avatarPromise = Promise.resolve();
      if (editAvatarPreview) {
        avatarPromise = uploadImageToImgbb(editAvatarPreview)
          .then(url => {
            updates.avatar = url;
          })
          .catch(err => {
            console.warn('Error al subir avatar:', err);
            alert('Error al subir la foto de perfil.');
          });
      }

      avatarPromise.then(() => {
        return updateUserProfile(auth.currentUser.uid, updates);
      }).then(() => {
        profileData.name = newName;
        profileData.bio = newBio;
        if (updates.avatar) {
          profileData.avatar = updates.avatar;
        }
        showProfile(currentUserId);
      }).catch(err => {
        alert('Error al guardar perfil: ' + err.message);
        console.error(err);
      });
    }

    // ---- NAVEGACIÓN ----
    function clearMainContent() {
      mainContent.innerHTML = '';
    }

    function showHome() {
      stopAllMusic();
      closeComments();
      clearMainContent();
      showTopBar(true);
      homeBtn.classList.add('active');
      profileBtn.classList.remove('active');
      updateFeedContainer();
    }

    function showEditProfile() {
      stopAllMusic();
      closeComments();
      clearMainContent();
      showTopBar(false);
      const editView = createEditProfileView();
      mainContent.appendChild(editView);
      homeBtn.classList.remove('active');
      profileBtn.classList.add('active');
    }

    // ============================================================
    //  AUTH LISTENER
    // ============================================================
    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUserId = user.uid;
        loadUserProfile(user.uid);
        showHome();
      } else {
        currentUserId = null;
        postOrder = [];
        autoPlayAttempted = false;
        showLoginView();
        homeBtn.classList.remove('active');
        profileBtn.classList.remove('active');
      }
    });

    // ============================================================
    //  EVENTOS UI
    // ============================================================
    homeBtn.addEventListener('click', () => {
      if (auth.currentUser) showHome();
    });
    profileBtn.addEventListener('click', () => {
      if (auth.currentUser) showProfile(currentUserId);
    });

    searchBtn.addEventListener('click', () => {
      if (auth.currentUser) showSearchView();
    });

    plusBtn.addEventListener('click', function() {
      if (!auth.currentUser) return;
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.multiple = true;
      fileInput.style.display = 'none';
      document.body.appendChild(fileInput);
      fileInput.click();

      fileInput.addEventListener('change', function(e) {
        const files = e.target.files;
        if (!files || files.length === 0) {
          fileInput.remove();
          return;
        }
        let loaded = 0;
        const imageData = [];
        for (let i = 0; i < files.length; i++) {
          const reader = new FileReader();
          reader.onload = function(ev) {
            imageData.push(ev.target.result);
            loaded++;
            if (loaded === files.length) {
              fileInput.remove();
              showCreatePost(imageData);
            }
          };
          reader.readAsDataURL(files[i]);
        }
      });

      window.addEventListener('focus', function() {
        setTimeout(() => {
          if (fileInput.parentNode) fileInput.remove();
        }, 1000);
      }, { once: true });
    });

    closeCommentsBtn.addEventListener('click', closeComments);
    commentsOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeComments();
    });
    sendCommentBtn.addEventListener('click', addComment);
    commentInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        addComment();
      }
    });

    // Eventos del selector de música
    closeMusicPickerBtn.addEventListener('click', closeMusicPicker);
    musicPickerOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeMusicPicker();
    });

    // Eventos del diálogo de descarga
    downloadCancelBtn.addEventListener('click', closeDownloadDialog);
    downloadOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeDownloadDialog();
    });
    downloadConfirmBtn.addEventListener('click', downloadSelectedImages);

    loadMusicFromJson().catch(() => {});
  </script>
