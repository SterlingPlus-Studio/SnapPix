    // ---- EDITAR PERFIL ----
    function createEditProfileView() {
      const container = document.createElement('div');
      container.className = 'edit-profile-view active';
      container.id = 'editProfileView';

      let avatarPreviewHtml = '';
      if (profileData.avatar) {
        avatarPreviewHtml = `<img src="${profileData.avatar}" alt="Avatar" id="editAvatarImg" />`;
      } else {
        avatarPreviewHtml = `<i class="fas fa-user-circle placeholder-icon" id="editAvatarPlaceholder"></i>`;
      }

      let totalLikesForVerified = 0;
      posts.filter(function(p) { return p.authorUid === currentUserId; }).forEach(function(post) {
        totalLikesForVerified += (post.likes || 0);
      });
      const canUseVerifiedSticker = totalLikesForVerified >= 100;
      editVerifiedSticker = profileData.verifiedSticker || null;

      container.innerHTML = `
        <div class="edit-header">
          <button class="back-btn" id="editBackBtn"><i class="fas fa-arrow-left"></i></button>
          <h2>Editar perfil</h2>
          <button class="save-btn" id="editSaveBtn">Guardar</button>
        </div>
        <div class="edit-avatar-section">
          <div class="avatar-preview" id="editAvatarPreview">${avatarPreviewHtml}</div>
          <div class="avatar-hint">Toca la foto para cambiarla</div>
          <input type="file" id="editAvatarInput" accept="image/*" />
        </div>
        <div class="edit-field">
          <label for="editNameInput">Nombre</label>
          <input type="text" id="editNameInput" value="${profileData.name}" placeholder="Tu nombre" />
        </div>
        <div class="edit-field">
          <label for="editBioInput">Descripción</label>
          <textarea id="editBioInput" placeholder="Cuéntanos sobre ti">${profileData.bio}</textarea>
        </div>
        <div class="verified-sticker-section ${canUseVerifiedSticker ? '' : 'disabled'}" id="verifiedStickerSection">
          <div class="verified-sticker-header">
            <div class="title"><i class="fas fa-check-circle"></i> Sticker de verificado</div>
            <div class="status">${canUseVerifiedSticker ? 'Desbloqueado' : `${totalLikesForVerified}/100 me gustas`}</div>
          </div>
          <div class="verified-sticker-help">
            ${canUseVerifiedSticker ? 'Elige un sticker para mostrarlo al lado de tu nombre.' : 'Consigue 100 me gustas para desbloquear esta opción.'}
          </div>
          ${!canUseVerifiedSticker ? '<div class="verified-sticker-lock"><i class="fas fa-lock"></i> Bloqueado</div>' : ''}
          <div class="verified-sticker-options" id="verifiedStickerOptions">
            ${VERIFIED_STICKER_OPTIONS.map(function(optionUrl, index) {
              const selectedClass = editVerifiedSticker === optionUrl ? 'selected' : '';
              const selectedCheck = editVerifiedSticker === optionUrl ? '<span class="selected-check"><i class="fas fa-check"></i></span>' : '';
              const lockedClass = canUseVerifiedSticker ? '' : 'locked';
              const stickerName = 'Sticker verificado ' + (index + 1);
              return `
                <div class="verified-sticker-option ${selectedClass} ${lockedClass}" data-sticker-url="${optionUrl}">
                  <div class="sticker-preview">
                    <img src="${optionUrl}" alt="${stickerName}" />
                  </div>
                  <div class="sticker-name">${stickerName}</div>
                  ${selectedCheck}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;

      container.querySelector('#editBackBtn').addEventListener('click', function() {
        stopAllMusic();
        showProfile(currentUserId);
      });
      container.querySelector('#editSaveBtn').addEventListener('click', saveProfileData);
      const avatarPreview = container.querySelector('#editAvatarPreview');
      const fileInput = container.querySelector('#editAvatarInput');
      avatarPreview.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          const dataUrl = ev.target.result;
          avatarPreview.innerHTML = `<img src="${dataUrl}" alt="Avatar" id="editAvatarImg" />`;
          editAvatarPreview = dataUrl;
          editAvatarFile = file;
        };
        reader.readAsDataURL(file);
      });

      const verifiedStickerOptions = container.querySelectorAll('.verified-sticker-option');
      verifiedStickerOptions.forEach(function(optionEl) {
        optionEl.addEventListener('click', function() {
          if (!canUseVerifiedSticker) return;
          const stickerUrl = this.dataset.stickerUrl;
          editVerifiedSticker = stickerUrl;
          verifiedStickerOptions.forEach(function(other) {
            other.classList.remove('selected');
            const check = other.querySelector('.selected-check');
            if (check) check.remove();
          });
          this.classList.add('selected');
          if (!this.querySelector('.selected-check')) {
            this.insertAdjacentHTML('beforeend', '<span class="selected-check"><i class="fas fa-check"></i></span>');
          }
        });
      });

      return container;
    }

    function saveProfileData() {
      const editView = document.getElementById('editProfileView');
      if (!editView) return;
      const nameInput = editView.querySelector('#editNameInput');
      const bioInput = editView.querySelector('#editBioInput');
      const newName = nameInput.value.trim() || 'Usuario';
      const newBio = bioInput.value.trim() || '';

      const updates = {
        name: newName,
        bio: newBio
      };

      let totalLikesForVerified = 0;
      posts.filter(function(p) { return p.authorUid === currentUserId; }).forEach(function(post) {
        totalLikesForVerified += (post.likes || 0);
      });
      const canUseVerifiedSticker = totalLikesForVerified >= 100;
      if (canUseVerifiedSticker) {
        updates.verifiedSticker = editVerifiedSticker || null;
      }

      let avatarPromise = Promise.resolve();
      if (editAvatarPreview) {
        avatarPromise = uploadImageToImgbb(editAvatarPreview)
          .then(url => {
            updates.avatar = url;
          })
          .catch(err => {
            console.warn('Error al subir avatar:', err);
            alert('Error al subir la foto de perfil.');
          });
      }

      avatarPromise.then(() => {
        return updateUserProfile(auth.currentUser.uid, updates);
      }).then(() => {
        profileData.name = newName;
        profileData.bio = newBio;
        if (updates.avatar) {
          profileData.avatar = updates.avatar;
        }
        if (Object.prototype.hasOwnProperty.call(updates, 'verifiedSticker')) {
          profileData.verifiedSticker = updates.verifiedSticker;
        }
        // Actualizar también el perfil en el almacén global
        userProfiles[currentUserId] = { ...profileData };
        showProfile(currentUserId);
      }).catch(err => {
        alert('Error al guardar perfil: ' + err.message);
        console.error(err);
      });
    }

    // ---- NAVEGACIÓN ----
    function clearMainContent() {
      mainContent.innerHTML = '';
    }

    function showHome() {
      stopAllMusic();
      closeComments();
      const targetScrollTop = feedScrollTop || 0;
      clearMainContent();
      showTopBar(true);
      setBottomNavActive('home');
      updateFeedContainer();
      restoreFeedScrollPosition(targetScrollTop);
    }

    function showEditProfile() {
      saveFeedScrollPosition();
      stopAllMusic();
      closeComments();
      clearMainContent();
      showTopBar(false);
      const editView = createEditProfileView();
      mainContent.appendChild(editView);
      setBottomNavActive('profile');
    }

    // ============================================================
    //  AUTH LISTENER
    // ============================================================
    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUserId = user.uid;
        loadUserProfile(user.uid);
        showHome();
      } else {
        currentUserId = null;
        postOrder = [];
        autoPlayAttempted = false;
        profilesLoaded = false;
        userProfiles = {};
        showLoginView();
        setBottomNavActive(null);
      }
    });

    // ============================================================
    //  EVENTOS UI
    // ============================================================
    homeBtn.addEventListener('pointerdown', () => {
      if (auth.currentUser) setBottomNavActive('home');
    });
    profileBtn.addEventListener('pointerdown', () => {
      if (auth.currentUser) setBottomNavActive('profile');
    });

    homeBtn.addEventListener('click', () => {
      if (auth.currentUser) {
        setBottomNavActive('home');
        showHome();
      }
    });
    profileBtn.addEventListener('click', () => {
      if (auth.currentUser) {
        setBottomNavActive('profile');
        showProfile(currentUserId);
      }
    });

    searchBtn.addEventListener('click', () => {
      if (auth.currentUser) showSearchView();
    });

    plusBtn.addEventListener('click', function() {
      if (!auth.currentUser) return;
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.multiple = true;
      fileInput.style.display = 'none';
      document.body.appendChild(fileInput);
      fileInput.click();

      fileInput.addEventListener('change', function(e) {
        const files = e.target.files;
        if (!files || files.length === 0) {
          fileInput.remove();
          return;
        }
        let loaded = 0;
        const imageData = [];
        for (let i = 0; i < files.length; i++) {
          const reader = new FileReader();
          reader.onload = function(ev) {
            imageData.push(ev.target.result);
            loaded++;
            if (loaded === files.length) {
              fileInput.remove();
              showCreatePost(imageData);
            }
          };
          reader.readAsDataURL(files[i]);
        }
      });

      window.addEventListener('focus', function() {
        setTimeout(() => {
          if (fileInput.parentNode) fileInput.remove();
        }, 1000);
      }, { once: true });
    });

    closeCommentsBtn.addEventListener('click', closeComments);
    commentsOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeComments();
    });
    sendCommentBtn.addEventListener('click', addComment);
    commentInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        addComment();
      }
    });

    // Eventos del selector de música
    closeMusicPickerBtn.addEventListener('click', closeMusicPicker);
    musicPickerOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeMusicPicker();
    });
    if (musicSearchInput) {
      musicSearchInput.addEventListener('input', updateMusicPicker);
    }

    // Eventos del diálogo de descarga
    downloadCancelBtn.addEventListener('click', closeDownloadDialog);
    downloadOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeDownloadDialog();
    });
    downloadConfirmBtn.addEventListener('click', downloadSelectedImages);

    // Eventos del diálogo de confirmación de eliminación
    deleteConfirmCancel.addEventListener('click', closeDeleteConfirm);
    deleteConfirmAccept.addEventListener('click', function() {
      if (postToDeleteId) {
        deletePost(postToDeleteId);
      } else {
        closeDeleteConfirm();
      }
    });
    deleteConfirmOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeDeleteConfirm();
    });

    loadMusicFromJson().catch(() => {});
  </script>
</body>
</html>
